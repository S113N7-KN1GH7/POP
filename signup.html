<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | POP123</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card signup-card">
            <div class="auth-header">
                <div class="auth-logo">🏴‍☠️</div>
                <h2>Join the Crew!</h2>
                <p>Become a legendary pirate of the pitch</p>
            </div>
            
            <form id="signupForm" class="auth-form" enctype="multipart/form-data">
                <!-- Basic Info -->
                <div class="form-row">
                    <div class="input-field">
                        <label>Player Name *</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🏴‍☠️</span>
                            <input type="text" id="player_name" placeholder="Your gaming name" required>
                        </div>
                    </div>
                    
                    <div class="input-field">
                        <label>Email *</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📧</span>
                            <input type="email" id="email" placeholder="your@email.com" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="input-field">
                        <label>Password *</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" placeholder="Min 6 characters" required>
                        </div>
                    </div>
                    
                    <div class="input-field">
                        <label>Confirm Password *</label>
                        <div class="input-wrapper">
                            <span class="input-icon">✓</span>
                            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                        </div>
                    </div>
                </div>
                
                <!-- Social & Contact -->
                <div class="form-row">
                    <div class="input-field">
                        <label>Facebook Profile Link</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📘</span>
                            <input type="url" id="fb_id_link" placeholder="https://facebook.com/yourprofile">
                        </div>
                    </div>
                    
                    <div class="input-field">
                        <label>Phone Number</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📱</span>
                            <input type="text" id="number" placeholder="Your contact number">
                        </div>
                    </div>
                </div>
                
                <!-- Gaming Info with Mobile Name Type -->
                <div class="form-row">
                    <div class="input-field">
                        <label>Konami User ID</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🎮</span>
                            <input type="text" id="konami_user_id" placeholder="eFootball/PES ID">
                        </div>
                    </div>
                    
                    <div class="input-field">
                        <label>Device / Mobile Name *</label>
                        <div class="input-wrapper">
                            <span class="input-icon">📱</span>
                            <input type="text" id="device_name" placeholder="e.g., iPhone 14, Samsung S23, OnePlus 11" required>
                        </div>
                        <small>Enter your device model name</small>
                    </div>
                </div>
                
                <!-- Photo Upload (Link না, সরাসরি আপলোড) -->
                <div class="form-section">
                    <h3>📸 Profile Images (Upload)</h3>
                    
                    <div class="form-row">
                        <div class="input-field">
                            <label>Profile Photo</label>
                            <div class="file-upload-wrapper">
                                <div class="file-upload-box" id="profileUploadBox">
                                    <span class="upload-icon">🖼️</span>
                                    <p>Click or drag to upload</p>
                                    <small>JPG, PNG, GIF (Max 2MB)</small>
                                    <input type="file" id="profile_photo" accept="image/*" class="file-input">
                                </div>
                                <div id="profilePreview" class="image-preview"></div>
                            </div>
                        </div>
                        
                        <div class="input-field">
                            <label>Cover Photo</label>
                            <div class="file-upload-wrapper">
                                <div class="file-upload-box" id="coverUploadBox">
                                    <span class="upload-icon">🌊</span>
                                    <p>Click or drag to upload</p>
                                    <small>JPG, PNG, GIF (Max 5MB)</small>
                                    <input type="file" id="cover_photo" accept="image/*" class="file-input">
                                </div>
                                <div id="coverPreview" class="image-preview"></div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="auth-btn">
                    <span>🏴‍☠️</span> Register as Pirate
                </button>
                
                <div id="errorMsg" class="error-message"></div>
            </form>
            
            <div class="auth-footer">
                <p>Already a pirate? <a href="login.html">Login Here</a></p>
            </div>
        </div>
        
        <div class="auth-bg-pattern"></div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
