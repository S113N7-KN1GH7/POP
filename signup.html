<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | POP123 - Pirates of Pitch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .signup-container {
            max-width: 600px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid #e8ecf1;
            overflow: hidden;
        }

        .signup-header {
            background: #ffffff;
            padding: 35px 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e8ecf1;
        }

        .logo-icon {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .signup-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .signup-header p {
            color: #8892b0;
            font-size: 14px;
        }

        .signup-body {
            padding: 30px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .input-group label i {
            color: #e94560;
            margin-right: 5px;
        }

        .input-group label .required {
            color: #e74c3c;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e8ecf1;
            border-radius: 12px;
            padding: 0 15px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #e94560;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }

        .input-wrapper i {
            color: #8892b0;
            font-size: 16px;
        }

        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            padding: 14px 12px;
            background: transparent;
            border: none;
            font-size: 14px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .input-wrapper select {
            cursor: pointer;
            color: #1a1a2e;
        }

        /* Photo Upload */
        .photo-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .upload-area {
            background: #f8fafc;
            border: 1px dashed #e8ecf1;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-area:hover {
            border-color: #e94560;
            background: #fff5f5;
        }

        .upload-area i {
            font-size: 24px;
            color: #8892b0;
            margin-bottom: 8px;
        }

        .upload-area h4 {
            font-size: 13px;
            margin-bottom: 4px;
        }

        .upload-area p {
            font-size: 11px;
            color: #8892b0;
        }

        .file-input {
            display: none;
        }

        .preview-container {
            margin-top: 10px;
            position: relative;
            display: inline-block;
        }

        .preview-container img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid #e94560;
        }

        .remove-preview {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #e74c3c;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            color: white;
            font-size: 10px;
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .signup-btn:hover {
            background: #ff6b81;
            transform: translateY(-1px);
        }

        .signup-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e8ecf1;
            font-size: 14px;
            color: #4a5568;
        }

        .login-link a {
            color: #e94560;
            text-decoration: none;
            font-weight: 500;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 550px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .input-group.full-width {
                grid-column: span 1;
            }
            .photo-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <div class="logo-icon">🏴‍☠️</div>
            <h1>Join the Crew!</h1>
            <p>Become a legendary pirate of the pitch</p>
        </div>
        
        <div class="signup-body">
            <form id="signupForm">
                <div class="form-grid">
                    <!-- Player Name -->
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Player Name <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-skull-crossbones"></i>
                            <input type="text" id="player_name" placeholder="Enter your gaming name" required>
                        </div>
                    </div>
                    
                    <!-- Email -->
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="your@email.com" required>
                        </div>
                    </div>
                    
                    <!-- Password -->
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Password <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Min 6 characters" required>
                        </div>
                    </div>
                    
                    <!-- Confirm Password -->
                    <div class="input-group">
                        <label><i class="fas fa-check-circle"></i> Confirm Password <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-check-circle"></i>
                            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                        </div>
                    </div>
                    
                    <!-- Konami User ID -->
                    <div class="input-group">
                        <label><i class="fas fa-id-card"></i> Konami User ID</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="konami_user_id" placeholder="eFootball/PES ID">
                        </div>
                    </div>
                    
                    <!-- Phone Number -->
                    <div class="input-group">
                        <label><i class="fas fa-phone"></i> Phone Number</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="number" placeholder="+8801XXXXXXXXX">
                        </div>
                    </div>
                    
                    <!-- Device Name -->
                    <div class="input-group">
                        <label><i class="fas fa-mobile-alt"></i> Device Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-mobile-alt"></i>
                            <input type="text" id="device_name" placeholder="e.g., iPhone 14, Samsung S23">
                        </div>
                    </div>
                    
                    <!-- Facebook Link -->
                    <div class="input-group">
                        <label><i class="fab fa-facebook"></i> Facebook Profile</label>
                        <div class="input-wrapper">
                            <i class="fab fa-facebook"></i>
                            <input type="url" id="fb_id_link" placeholder="https://facebook.com/yourprofile">
                        </div>
                    </div>
                </div>
                
                <!-- Photo Upload Section -->
                <div class="photo-section">
                    <div class="upload-area" id="profileUploadBox">
                        <i class="fas fa-camera"></i>
                        <h4>Profile Photo</h4>
                        <p>Click to upload</p>
                        <small>Max 2MB (JPG, PNG)</small>
                        <input type="file" id="profile_photo" accept="image/*" class="file-input">
                        <div id="profilePreview" class="preview-container"></div>
                    </div>
                    
                    <div class="upload-area" id="coverUploadBox">
                        <i class="fas fa-image"></i>
                        <h4>Cover Photo</h4>
                        <p>Click to upload</p>
                        <small>Max 2MB (JPG, PNG)</small>
                        <input type="file" id="cover_photo" accept="image/*" class="file-input">
                        <div id="coverPreview" class="preview-container"></div>
                    </div>
                </div>
                
                <button type="submit" class="signup-btn" id="signupBtn">🏴‍☠️ Register Now</button>
                <div id="errorMsg" class="error-message"></div>
            </form>
            
            <div class="login-link">
                <p>Already a pirate? <a href="login.html">Login Here</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // Supabase Configuration
        const supabaseUrl = 'https://uwybeitqpnaqmcmqwbkv.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g';
        const supabase = createClient(supabaseUrl, supabaseAnonKey);

        // Variables
        let uploadedProfileUrl = null;
        let uploadedCoverUrl = null;

        // File upload handlers
        function setupFileUploads() {
            const profileInput = document.getElementById('profile_photo');
            const profileBox = document.getElementById('profileUploadBox');
            const coverInput = document.getElementById('cover_photo');
            const coverBox = document.getElementById('coverUploadBox');

            if (profileBox) profileBox.addEventListener('click', () => profileInput.click());
            if (coverBox) coverBox.addEventListener('click', () => coverInput.click());

            if (profileInput) profileInput.addEventListener('change', (e) => handleFileUpload(e.target.files[0], 'profile'));
            if (coverInput) coverInput.addEventListener('change', (e) => handleFileUpload(e.target.files[0], 'cover'));
        }

        async function handleFileUpload(file, type) {
            if (!file) return;
            
            if (file.size > 2 * 1024 * 1024) {
                alert('Image must be less than 2MB');
                return;
            }
            
            const previewDiv = document.getElementById(`${type}Preview`);
            previewDiv.innerHTML = '<span style="font-size:12px;">Uploading...</span>';
            
            const fileName = `${type}_${Date.now()}_${file.name}`;
            
            const { data, error } = await supabase.storage
                .from('player-photos')
                .upload(`temp/${fileName}`, file);
            
            if (error) {
                alert('Upload failed: ' + error.message);
                previewDiv.innerHTML = '';
                return;
            }
            
            const { data: publicUrlData } = supabase.storage
                .from('player-photos')
                .getPublicUrl(`temp/${fileName}`);
            
            const imageUrl = publicUrlData.publicUrl;
            
            if (type === 'profile') {
                uploadedProfileUrl = imageUrl;
            } else {
                uploadedCoverUrl = imageUrl;
            }
            
            previewDiv.innerHTML = `
                <div class="preview-container">
                    <img src="${imageUrl}" alt="${type} preview">
                    <button type="button" class="remove-preview" onclick="window.removeImage('${type}')">✕</button>
                </div>
            `;
        }

        window.removeImage = (type) => {
            if (type === 'profile') {
                uploadedProfileUrl = null;
                document.getElementById('profilePreview').innerHTML = '';
                document.getElementById('profile_photo').value = '';
            } else {
                uploadedCoverUrl = null;
                document.getElementById('coverPreview').innerHTML = '';
                document.getElementById('cover_photo').value = '';
            }
        };

        // Form submission
        const signupForm = document.getElementById('signupForm');
        const signupBtn = document.getElementById('signupBtn');
        const errorMsg = document.getElementById('errorMsg');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get all values
            const player_name = document.getElementById('player_name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const konami_user_id = document.getElementById('konami_user_id').value || null;
            const number = document.getElementById('number').value || null;
            const device_name = document.getElementById('device_name').value || null;
            const fb_id_link = document.getElementById('fb_id_link').value || null;
            
            // Validation
            errorMsg.innerText = '';
            
            if (!player_name || player_name.length < 3) {
                errorMsg.innerText = "❌ Player name must be at least 3 characters!";
                return;
            }
            
            if (!email || !email.includes('@')) {
                errorMsg.innerText = "❌ Valid email required!";
                return;
            }
            
            if (!password || password.length < 6) {
                errorMsg.innerText = "❌ Password must be at least 6 characters!";
                return;
            }
            
            if (password !== confirmPassword) {
                errorMsg.innerText = "❌ Passwords don't match!";
                return;
            }
            
            signupBtn.disabled = true;
            signupBtn.innerHTML = '<span class="spinner"></span> Creating Account...';
            
            try {
                // 1. Create Auth User (Password এখানে save হবে)
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            player_name: player_name,
                            device_name: device_name
                        }
                    }
                });
                
                if (authError) throw authError;
                
                if (!authData.user) {
                    throw new Error("User creation failed!");
                }
                
                console.log("Auth user created:", authData.user.id);
                
                // 2. Insert into players table
                const { error: insertError } = await supabase
                    .from('players')
                    .insert({
                        id: authData.user.id,
                        player_name: player_name,
                        email: email,
                        konami_user_id: konami_user_id,
                        number: number,
                        device_name: device_name,
                        fb_id_link: fb_id_link,
                        photo: uploadedProfileUrl,
                        cover_photo: uploadedCoverUrl,
                        win: 0,
                        loss: 0,
                        draw: 0,
                        gf: 0,
                        ga: 0,
                        pts: 0,
                        created_at: new Date(),
                        updated_at: new Date()
                    });
                
                if (insertError) throw insertError;
                
                console.log("Player data inserted successfully!");
                alert('✅ Registration Successful! Please login.');
                window.location.href = 'login.html';
                
            } catch (error) {
                console.error("Signup error:", error);
                errorMsg.innerText = "❌ " + (error.message || "Registration failed!");
                signupBtn.disabled = false;
                signupBtn.innerHTML = '🏴‍☠️ Register Now';
            }
        });

        // Initialize
        setupFileUploads();
    </script>
</body>
</html>
