
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | POP123 - Pirates of Pitch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .signup-container {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 35px 30px;
            text-align: center;
            color: white;
        }

        .logo-icon {
            font-size: 50px;
            margin-bottom: 10px;
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }

        .signup-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .signup-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .signup-body {
            padding: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 0;
        }

        .input-group.full-width {
            grid-column: span 2;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .input-group label i {
            color: #667eea;
            margin-right: 5px;
        }

        .input-group label .required {
            color: #e74c3c;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border: 1px solid #e1e8ed;
            border-radius: 12px;
            padding: 0 15px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .input-wrapper i {
            color: #8892b0;
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 12px;
            background: transparent;
            border: none;
            font-size: 14px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .photo-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        .upload-box {
            background: #f8f9fa;
            border: 2px dashed #e1e8ed;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-box:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .upload-box i {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .upload-box h4 {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .upload-box p {
            font-size: 11px;
            color: #8892b0;
        }

        .file-input {
            display: none;
        }

        .preview-img {
            margin-top: 10px;
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            border: 2px solid #667eea;
        }

        .remove-btn {
            background: #e74c3c;
            border: none;
            border-radius: 5px;
            padding: 2px 8px;
            margin-top: 5px;
            color: white;
            cursor: pointer;
            font-size: 11px;
        }

        .signup-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .signup-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .success-message {
            color: #27ae60;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e1e8ed;
            font-size: 14px;
            color: #8892b0;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 550px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .photo-section {
                grid-template-columns: 1fr;
            }
            .input-group.full-width {
                grid-column: span 1;
            }
            .signup-header {
                padding: 25px 20px;
            }
            .signup-header h1 {
                font-size: 24px;
            }
            .signup-body {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <div class="logo-icon">🏴‍☠️</div>
            <h1>Join the Crew!</h1>
            <p>Become a legendary pirate of the pitch</p>
        </div>
        
        <div class="signup-body">
            <form id="signupForm">
                <div class="form-row">
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Player Name <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-skull-crossbones"></i>
                            <input type="text" id="player_name" placeholder="Enter your gaming name" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-envelope"></i> Email <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="your@email.com" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-lock"></i> Password <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Min 6 characters" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-check-circle"></i> Confirm Password <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fas fa-check-circle"></i>
                            <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-id-card"></i> Konami User ID</label>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card"></i>
                            <input type="text" id="konami_user_id" placeholder="eFootball/PES ID">
                        </div>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-phone"></i> Phone Number</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" id="number" placeholder="+8801XXXXXXXXX">
                        </div>
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-mobile-alt"></i> Device Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-mobile-alt"></i>
                            <input type="text" id="device_name" placeholder="e.g., iPhone 14, Samsung S23">
                        </div>
                    </div>
                    <div class="input-group">
                        <label><i class="fab fa-facebook"></i> Facebook Profile</label>
                        <div class="input-wrapper">
                            <i class="fab fa-facebook"></i>
                            <input type="url" id="fb_id_link" placeholder="https://facebook.com/yourprofile">
                        </div>
                    </div>
                </div>
                
                <!-- Photo Upload Section -->
                <div class="photo-section">
                    <div class="upload-box" id="profileBox">
                        <i class="fas fa-camera"></i>
                        <h4>Profile Photo</h4>
                        <p>Click to upload (Max 2MB)</p>
                        <input type="file" id="profile_photo" accept="image/*" class="file-input">
                        <div id="profilePreview"></div>
                    </div>
                    <div class="upload-box" id="coverBox">
                        <i class="fas fa-image"></i>
                        <h4>Cover Photo</h4>
                        <p>Click to upload (Max 2MB)</p>
                        <input type="file" id="cover_photo" accept="image/*" class="file-input">
                        <div id="coverPreview"></div>
                    </div>
                </div>
                
                <button type="submit" class="signup-btn" id="signupBtn">🏴‍☠️ Register Now</button>
                <div id="errorMsg" class="error-message"></div>
                <div id="successMsg" class="success-message"></div>
            </form>
            
            <div class="login-link">
                <p>Already a pirate? <a href="login.html">Login Here</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // Supabase Configuration
        const supabaseUrl = 'https://uwybeitqpnaqmcmqwbkv.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g';
        const supabase = createClient(supabaseUrl, supabaseAnonKey);

        // Variables for uploaded images
        let uploadedProfileUrl = null;
        let uploadedCoverUrl = null;

        // ========== FILE UPLOAD HANDLERS ==========
        const profileBox = document.getElementById('profileBox');
        const profileInput = document.getElementById('profile_photo');
        const coverBox = document.getElementById('coverBox');
        const coverInput = document.getElementById('cover_photo');

        if (profileBox) profileBox.addEventListener('click', () => profileInput.click());
        if (coverBox) coverBox.addEventListener('click', () => coverInput.click());

        if (profileInput) profileInput.addEventListener('change', (e) => uploadFile(e.target.files[0], 'profile'));
        if (coverInput) coverInput.addEventListener('change', (e) => uploadFile(e.target.files[0], 'cover'));

        async function uploadFile(file, type) {
            if (!file) return;
            
            if (file.size > 2 * 1024 * 1024) {
                alert('Image must be less than 2MB');
                return;
            }
            
            const previewDiv = document.getElementById(`${type}Preview`);
            previewDiv.innerHTML = '<span style="font-size:12px;">Uploading...</span>';
            
            const fileName = `${type}_${Date.now()}_${file.name}`;
            
            const { error } = await supabase.storage
                .from('player-photos')
                .upload(`temp/${fileName}`, file);
            
            if (error) {
                alert('Upload failed: ' + error.message);
                previewDiv.innerHTML = '';
                return;
            }
            
            const { data: urlData } = supabase.storage
                .from('player-photos')
                .getPublicUrl(`temp/${fileName}`);
            
            if (type === 'profile') {
                uploadedProfileUrl = urlData.publicUrl;
            } else {
                uploadedCoverUrl = urlData.publicUrl;
            }
            
            previewDiv.innerHTML = `
                <img src="${urlData.publicUrl}" class="preview-img">
                <br>
                <button type="button" class="remove-btn" onclick="window.removeImage('${type}')">Remove</button>
            `;
        }

        window.removeImage = (type) => {
            if (type === 'profile') {
                uploadedProfileUrl = null;
                document.getElementById('profilePreview').innerHTML = '';
                profileInput.value = '';
            } else {
                uploadedCoverUrl = null;
                document.getElementById('coverPreview').innerHTML = '';
                coverInput.value = '';
            }
        };

        // ========== FORM SUBMISSION ==========
        const form = document.getElementById('signupForm');
        const signupBtn = document.getElementById('signupBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Get form values
            const player_name = document.getElementById('player_name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const konami_user_id = document.getElementById('konami_user_id').value || null;
            const number = document.getElementById('number').value || null;
            const device_name = document.getElementById('device_name').value || null;
            const fb_id_link = document.getElementById('fb_id_link').value || null;
            
            // Clear messages
            errorMsg.innerText = '';
            successMsg.innerText = '';
            
            // Validation
            if (player_name.length < 3) {
                errorMsg.innerText = "❌ Player name must be at least 3 characters!";
                return;
            }
            
            if (!email || !email.includes('@')) {
                errorMsg.innerText = "❌ Valid email required!";
                return;
            }
            
            if (!password || password.length < 6) {
                errorMsg.innerText = "❌ Password must be at least 6 characters!";
                return;
            }
            
            if (password !== confirmPassword) {
                errorMsg.innerText = "❌ Passwords do not match!";
                return;
            }
            
            // Disable button and show loading
            signupBtn.disabled = true;
            signupBtn.innerHTML = '<span class="spinner"></span> Creating Account...';
            
            try {
                // Step 1: Create Auth User (Email confirmation is OFF in Supabase)
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            player_name: player_name,
                            device_name: device_name
                        }
                    }
                });
                
                if (authError) throw authError;
                
                if (!authData.user) {
                    throw new Error("User creation failed!");
                }
                
                console.log("Auth user created:", authData.user.id);
                
                // Step 2: Insert into players table
                const { error: insertError } = await supabase
                    .from('players')
                    .insert({
                        id: authData.user.id,
                        player_name: player_name,
                        email: email,
                        konami_user_id: konami_user_id,
                        number: number,
                        device_name: device_name,
                        fb_id_link: fb_id_link,
                        photo: uploadedProfileUrl,
                        cover_photo: uploadedCoverUrl,
                        win: 0,
                        loss: 0,
                        draw: 0,
                        gf: 0,
                        ga: 0,
                        pts: 0,
                        created_at: new Date(),
                        updated_at: new Date()
                    });
                
                if (insertError) throw insertError;
                
                console.log("Player data inserted successfully!");
                
                // Success - redirect to login
                successMsg.innerText = "✅ Registration Successful! Redirecting to login...";
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
                
            } catch (err) {
                console.error("Signup error:", err);
                errorMsg.innerText = "❌ " + (err.message || "Registration failed. Please try again!");
                signupBtn.disabled = false;
                signupBtn.innerHTML = '🏴‍☠️ Register Now';
            }
        });
    </script>
</body>
</html>
