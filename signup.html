<!DOCTYPE html>
<html>
<head>
  <title>Player Signup</title>

  <!-- ✅ Correct Supabase CDN -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Signup</h2>

  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Create Account</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://uwybeitqpnaqmcmqwbkv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g"
);

async function signup() {

  console.log("Signup clicked");

  const player_name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (!player_name || !email || !password) {
    alert("Fill all fields");
    return;
  }

  // 🔐 Auth signup
  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  console.log("Auth:", data, error);

  if (error) {
    alert(error.message);
    return;
  }

  // ⚠️ Email confirm ON থাকলে user null হবে
  if (!data.user) {
    alert("Check your email to confirm account");
    return;
  }

  // 📦 Insert player
  const { error: insertError } = await supabase.from("players").insert([
    {
      user_id: data.user.id,
      player_name,
      email
    }
  ]);

  console.log("Insert:", insertError);

  if (insertError) {
    alert(insertError.message);
  } else {
    alert("Signup Success 🎉");
  }
}
</script>

</body>
</html>
