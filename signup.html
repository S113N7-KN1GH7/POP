<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | POP123 - Pirates of Pitch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .signup-container {
            max-width: 550px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border: 1px solid #e8ecf1;
            overflow: hidden;
        }

        .signup-header {
            background: #ffffff;
            padding: 35px 30px 20px;
            text-align: center;
            border-bottom: 1px solid #e8ecf1;
        }

        .logo-icon {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .signup-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .signup-header p {
            color: #8892b0;
            font-size: 14px;
        }

        .signup-body {
            padding: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .input-group label i {
            color: #e94560;
            margin-right: 5px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e8ecf1;
            border-radius: 12px;
            padding: 0 15px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #e94560;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }

        .input-wrapper i {
            color: #8892b0;
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 12px;
            background: transparent;
            border: none;
            font-size: 14px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        /* Photo Upload */
        .photo-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .upload-area {
            background: #f8fafc;
            border: 1px dashed #e8ecf1;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-area:hover {
            border-color: #e94560;
            background: #fff5f5;
        }

        .upload-area i {
            font-size: 24px;
            color: #8892b0;
            margin-bottom: 8px;
        }

        .upload-area h4 {
            font-size: 13px;
            margin-bottom: 4px;
        }

        .upload-area p {
            font-size: 11px;
            color: #8892b0;
        }

        .file-input {
            display: none;
        }

        .preview-container {
            margin-top: 10px;
            position: relative;
            display: inline-block;
        }

        .preview-container img {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid #e94560;
        }

        .remove-preview {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #e74c3c;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            color: white;
            font-size: 10px;
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            background: #e94560;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .signup-btn:hover {
            background: #ff6b81;
            transform: translateY(-1px);
        }

        .signup-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e8ecf1;
            font-size: 14px;
            color: #4a5568;
        }

        .login-link a {
            color: #e94560;
            text-decoration: none;
            font-weight: 500;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .photo-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <div class="logo-icon">🏴‍☠️</div>
            <h1>Join the Crew!</h1>
            <p>Become a legendary pirate of the pitch</p>
        </div>
        
        <div class="signup-body">
            <form id="signupForm">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Player Name *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-skull-crossbones"></i>
                        <input type="text" id="player_name" placeholder="Enter your gaming name" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email Address *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Min 6 characters" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-check-circle"></i> Confirm Password *</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check-circle"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-mobile-alt"></i> Device Name (Optional)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-mobile-alt"></i>
                        <input type="text" id="device_name" placeholder="e.g., iPhone 14, Samsung S23">
                    </div>
                </div>
                
                <!-- Photo Upload -->
                <div class="photo-section">
                    <div class="upload-area" id="profileUploadBox">
                        <i class="fas fa-camera"></i>
                        <h4>Profile Photo</h4>
                        <p>Click to upload</p>
                        <small>Max 2MB</small>
                        <input type="file" id="profile_photo" accept="image/*" class="file-input">
                        <div id="profilePreview" class="preview-container"></div>
                    </div>
                    
                    <div class="upload-area" id="coverUploadBox">
                        <i class="fas fa-image"></i>
                        <h4>Cover Photo</h4>
                        <p>Click to upload</p>
                        <small>Max 2MB</small>
                        <input type="file" id="cover_photo" accept="image/*" class="file-input">
                        <div id="coverPreview" class="preview-container"></div>
                    </div>
                </div>
                
                <button type="submit" class="signup-btn" id="signupBtn">🏴‍☠️ Register Now</button>
                <div id="errorMsg" class="error-message"></div>
            </form>
            
            <div class="login-link">
                <p>Already a pirate? <a href="login.html">Login Here</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const supabaseUrl = 'https://uwybeitqpnaqmcmqwbkv.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g';
        const supabase = createClient(supabaseUrl, supabaseAnonKey);

        let uploadedProfileUrl = null;
        let uploadedCoverUrl = null;

        // File upload handlers
        function setupFileUploads() {
            const profileInput = document.getElementById('profile_photo');
            const profileBox = document.getElementById('profileUploadBox');
            const coverInput = document.getElementById('cover_photo');
            const coverBox = document.getElementById('coverUploadBox');

            profileBox.addEventListener('click', () => profileInput.click());
            coverBox.addEventListener('click', () => coverInput.click());

            profileInput.addEventListener('change', (e) => handleFileUpload(e.target.files[0], 'profile'));
            coverInput.addEventListener('change', (e) => handleFileUpload(e.target.files[0], 'cover'));
        }

        async function handleFileUpload(file, type) {
            if (!file) return;
            
            if (file.size > 2 * 1024 * 1024) {
                alert('Image must be less than 2MB');
                return;
            }
            
            const previewDiv = document.getElementById(`${type}Preview`);
            previewDiv.innerHTML = '<span style="font-size:12px;">Uploading...</span>';
            
            const fileName = `${type}_${Date.now()}_${file.name}`;
            
            const { data, error } = await supabase.storage
                .from('player-photos')
                .upload(`temp/${fileName}`, file);
            
            if (error) {
                alert('Upload failed: ' + error.message);
                previewDiv.innerHTML = '';
                return;
            }
            
            const { data: publicUrlData } = supabase.storage
                .from('player-photos')
                .getPublicUrl(`temp/${fileName}`);
            
            const imageUrl = publicUrlData.publicUrl;
            
            if (type === 'profile') {
                uploadedProfileUrl = imageUrl;
            } else {
                uploadedCoverUrl = imageUrl;
            }
            
            previewDiv.innerHTML = `
                <div class="preview-container">
                    <img src="${imageUrl}" alt="${type} preview">
                    <button type="button" class="remove-preview" onclick="window.removeImage('${type}')">✕</button>
                </div>
            `;
        }

        window.removeImage = (type) => {
            if (type === 'profile') {
                uploadedProfileUrl = null;
                document.getElementById('profilePreview').innerHTML = '';
                document.getElementById('profile_photo').value = '';
            } else {
                uploadedCoverUrl = null;
                document.getElementById('coverPreview').innerHTML = '';
                document.getElementById('cover_photo').value = '';
            }
        };

        // Signup form submission
        const signupForm = document.getElementById('signupForm');
        const signupBtn = document.getElementById('signupBtn');
        const errorMsg = document.getElementById('errorMsg');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const player_name = document.getElementById('player_name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const device_name = document.getElementById('device_name').value || null;
            
            errorMsg.innerText = '';
            
            if (password !== confirmPassword) {
                errorMsg.innerText = "Passwords don't match!";
                return;
            }
            
            if (password.length < 6) {
                errorMsg.innerText = "Password must be at least 6 characters!";
                return;
            }
            
            if (player_name.length < 3) {
                errorMsg.innerText = "Player name must be at least 3 characters!";
                return;
            }
            
            signupBtn.disabled = true;
            signupBtn.innerHTML = '<span class="spinner"></span> Creating Account...';
            
            // Create auth user
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: { 
                        player_name: player_name, 
                        device_name: device_name 
                    }
                }
            });
            
            if (authError) {
                errorMsg.innerText = authError.message;
                signupBtn.disabled = false;
                signupBtn.innerHTML = '🏴‍☠️ Register Now';
                return;
            }
            
            if (!authData.user) {
                errorMsg.innerText = "User creation failed!";
                signupBtn.disabled = false;
                signupBtn.innerHTML = '🏴‍☠️ Register Now';
                return;
            }
            
            // Insert into players table
            const { error: insertError } = await supabase
                .from('players')
                .insert({
                    id: authData.user.id,
                    player_name: player_name,
                    email: email,
                    device_name: device_name,
                    photo: uploadedProfileUrl,
                    cover_photo: uploadedCoverUrl,
                    win: 0,
                    loss: 0,
                    draw: 0,
                    gf: 0,
                    ga: 0,
                    pts: 0
                });
            
            if (insertError) {
                console.error('Insert error:', insertError);
                errorMsg.innerText = "Profile creation failed: " + insertError.message;
                signupBtn.disabled = false;
                signupBtn.innerHTML = '🏴‍☠️ Register Now';
                return;
            }
            
            alert('✅ Registration Successful! Please login.');
            window.location.href = 'login.html';
        });

        setupFileUploads();
    </script>
</body>
</html>
