<!DOCTYPE html>
<html>
<head>
  <title>Player Signup</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    input:focus {
      border: 2px solid #22c55e;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }

    button:hover {
      background: #16a34a;
    }

    .link {
      text-align: center;
      margin-top: 10px;
    }

    .link a {
      color: #22c55e;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Player Signup</h2>

  <input id="name" placeholder="Player Name">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <input id="fb" placeholder="Facebook Profile Link">
  <input id="phone" placeholder="Phone Number">
  <input id="konami" placeholder="Konami User ID">
  <input id="device" placeholder="Device Name">
  <input id="photo" placeholder="Photo URL">
  <input id="cover" placeholder="Cover Photo URL">

  <button onclick="signup()">Create Account</button>

  <div class="link">
    Already have account? <a href="login.html">Login</a>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://uwybeitqpnaqmcmqwbkv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g"
);

async function signup() {

  const player_name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const fb = document.getElementById("fb").value || null;
  const phone = document.getElementById("phone").value || null;
  const konami = document.getElementById("konami").value || null;
  const device = document.getElementById("device").value || null;
  const photo = document.getElementById("photo").value || null;
  const cover = document.getElementById("cover").value || null;

  if (!player_name || !email || !password) {
    alert("Name, Email, Password required!");
    return;
  }

  // 🔐 Auth Signup
  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    alert(error.message);
    return;
  }

  const user = data.user;

  // 📦 Insert player
  const { error: insertError } = await supabase.from("players").insert([
    {
      user_id: user.id,
      player_name,
      email,
      fb_id_link: fb,
      number: phone,
      konami_user_id: konami,
      device_name: device,
      photo,
      cover_photo: cover
    }
  ]);

  if (insertError) {
    alert(insertError.message);
  } else {
    alert("Signup Successful 🎉");
    window.location.href = "login.html";
  }
}
</script>

</body>
</html>
