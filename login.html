<!-- LOGIN.HTML - Clean Login Page with Session Check -->
<!-- ============================================= -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pirates of Pitch - POP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 450px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 10px;
            animation: sway 3s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .login-body {
            padding: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 8px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border: 1px solid #e8ecf1;
            border-radius: 12px;
            padding: 0 15px;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .input-wrapper i {
            color: #8892b0;
            font-size: 16px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 12px;
            background: transparent;
            border: none;
            font-size: 14px;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #4a5568;
        }

        .checkbox input {
            cursor: pointer;
        }

        .forgot-link {
            color: #667eea;
            text-decoration: none;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }

        .signup-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e8ecf1;
            font-size: 14px;
            color: #4a5568;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-header {
                padding: 30px 20px;
            }
            .login-body {
                padding: 25px;
            }
            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">🏴‍☠️</div>
            <h1>Welcome Back!</h1>
            <p>Login to continue your pirate journey</p>
        </div>

        <div class="login-body">
            <form id="loginForm">
                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="captain@pop123.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Login to Dashboard</button>
                <div id="errorMsg" class="error-message"></div>
            </form>

            <div class="signup-link">
                <p>Don't have an account? <a href="signup.html">Create Account</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const supabaseUrl = 'https://uwybeitqpnaqmcmqwbkv.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g';
        const supabase = createClient(supabaseUrl, supabaseAnonKey);

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        // =============================================
        // CHECK IF USER IS ALREADY LOGGED IN
        // =============================================
        async function checkUserAndRedirect() {
            try {
                // Check local storage first
                const localUser = localStorage.getItem('pop123_user');
                if (localUser) {
                    // Verify with Supabase
                    const { data: { user }, error } = await supabase.auth.getUser();
                    if (user && !error) {
                        console.log("User already logged in, redirecting to dashboard...");
                        window.location.href = 'dashboard.html';
                        return;
                    } else {
                        // Invalid session, clear storage
                        localStorage.removeItem('pop123_user');
                    }
                }
                
                // Also check Supabase session directly
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    console.log("Active session found, redirecting to dashboard...");
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                console.log("Session check error:", err);
            }
        }

        // Run session check when page loads
        checkUserAndRedirect();

        // =============================================
        // LOGIN FORM SUBMIT
        // =============================================
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Clear previous error
            errorMsg.innerText = '';

            // Basic validation
            if (!email || !email.includes('@')) {
                errorMsg.innerText = 'Please enter a valid email address';
                return;
            }
            if (!password || password.length < 6) {
                errorMsg.innerText = 'Password must be at least 6 characters';
                return;
            }

            // Disable button and show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    errorMsg.innerText = error.message;
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Login to Dashboard';
                    return;
                }

                if (data?.user) {
                    // Store user in localStorage
                    localStorage.setItem('pop123_user', JSON.stringify(data.user));
                    
                    // If remember me is checked, store session for longer
                    if (rememberMe) {
                        // Supabase handles this automatically with session persistence
                        console.log("Remember me enabled - session will persist");
                    }
                    
                    // Redirect to dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.innerText = 'Login failed. Please try again.';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Login to Dashboard';
                }
            } catch (err) {
                console.error('Login error:', err);
                errorMsg.innerText = 'An unexpected error occurred. Please try again.';
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login to Dashboard';
            }
        });

        // Add enter key support
        const inputs = document.querySelectorAll('#loginForm input');
        inputs.forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    loginForm.dispatchEvent(new Event('submit'));
                }
            });
        });
    </script>
</body>
</html>
