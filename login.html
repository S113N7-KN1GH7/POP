<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | POP123</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">🏴‍☠️</div>
                <h2>Welcome Back, Pirate!</h2>
                <p>Login to continue your journey</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="input-field">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" placeholder="captain@pop123.com" required>
                    </div>
                </div>
                
                <div class="input-field">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
                
                <button type="submit" class="auth-btn">
                    <span>⚡</span> Login to Dashboard
                </button>
                
                <div id="errorMsg" class="error-message"></div>
            </form>
            
            <div class="auth-footer">
                <p>New to POP123? <a href="signup.html">Create an Account</a></p>
            </div>
        </div>
        
        <div class="auth-bg-pattern"></div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
