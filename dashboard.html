<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - POP123</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <div class="navbar">
            <h2>🏴‍☠️ POP123</h2>
            <button id="logoutBtn" class="btn-small">Logout</button>
        </div>
        <div class="welcome-box">
            <h3>Welcome, <span id="username"></span>! ⚡</h3>
            <p>Ready to conquer the pitch?</p>
        </div>
        <div class="stats">
            <div class="card">
                <h4>🏏 Matches</h4>
                <p id="totalMatches">0</p>
            </div>
            <div class="card">
                <h4>🌟 Wins</h4>
                <p id="wins">0</p>
            </div>
            <div class="card">
                <h4>📊 Points</h4>
                <p id="points">0</p>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
