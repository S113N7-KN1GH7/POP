<!DOCTYPE html>
<html>
<head>
<title>Match Text Submit</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px}
.box{max-width:700px;margin:auto;background:#fff;padding:20px;border-radius:10px}
textarea{width:100%;height:200px;margin-top:10px}
button{padding:10px 20px;background:#e94560;color:#fff;border:none;margin-top:10px}
.result{margin-top:20px}
.ok{color:green;font-weight:bold}
.bad{color:red;font-weight:bold}
</style>

</head>
<body>

<div class="box">

<h2>Match Submit</h2>

<select id="source">
<option>In-club</option>
<option>Cobeg</option>
<option>Efob</option>
<option>Efcob</option>
<option>Befc</option>
</select>

<textarea id="text" placeholder="Paste match text here..."></textarea>

<button onclick="submitMatch()">Submit</button>

<div id="preview" class="result"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
'https://uwybeitqpnaqmcmqwbkv.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g'
);

// 🔍 PARSE FUNCTION
function parse(text){

let lines = text.split('\n');
let out = [];

lines.forEach(l=>{

if(l.includes('🆚')){

let c = l.replace(/🔑|⚔️|—/g,'').trim();
let p = c.split('🆚');

let l1 = p[0].match(/(.+)\s(\d+)$/);
let r1 = p[1].match(/^(\d+)\s(.+)/);

if(l1 && r1){
out.push({
home:l1[1].trim(),
hs:parseInt(l1[2]),
as:parseInt(r1[1]),
away:r1[2].trim()
});
}

}

});

return out;
}

// 🔎 FIND PLAYER
async function findPlayer(name){

const {data} = await supabase.from('players').select('*');

return data.find(p =>
p.player_name.trim().toLowerCase() === name.trim().toLowerCase()
);

}

// 👁️ PREVIEW
async function preview(){

let txt = document.getElementById('text').value;
let games = parse(txt);

let html = '';

for(let g of games){

let p1 = await findPlayer(g.home);
let p2 = await findPlayer(g.away);

html += `
<div>
<span class="${p1?'ok':'bad'}">${g.home}</span> ${g.hs} 🆚 ${g.as}
<span class="${p2?'ok':'bad'}">${g.away}</span>
</div>`;
}

document.getElementById('preview').innerHTML = html;
}

// 💾 SUBMIT
async function submitMatch(){

let text = document.getElementById('text').value;
let source = document.getElementById('source').value;

// SAVE RAW
let raw = await supabase.from('match_raw')
.insert({source, full_text:text})
.select();

let matchId = raw.data[0].id;

let games = parse(text);

for(let g of games){

let p1 = await findPlayer(g.home);
let p2 = await findPlayer(g.away);

if(!p1 || !p2) continue;

// RESULT
let r1 = g.hs>g.as?'win':g.hs==g.as?'draw':'lose';
let r2 = g.as>g.hs?'win':g.hs==g.as?'draw':'lose';

// SAVE PLAYER MATCH
await supabase.from('match_player_results').insert([
{
match_id:matchId,
player_id:p1.id,
player_name:p1.player_name,
opponent_name:g.away,
goals_for:g.hs,
goals_against:g.as,
result:r1
},
{
match_id:matchId,
player_id:p2.id,
player_name:p2.player_name,
opponent_name:g.home,
goals_for:g.as,
goals_against:g.hs,
result:r2
}
]);

// UPDATE RANK
await updateRank(p1.id,g.hs,g.as);
await updateRank(p2.id,g.as,g.hs);

}

alert("✅ MATCH SAVED!");
}

// 📊 UPDATE RANK
async function updateRank(id,gf,ga){

let {data} = await supabase.from('player_rankings')
.select('*')
.eq('player_id',id)
.maybeSingle();

let w=0,d=0,l=0,p=0;

if(gf>ga){w=1;p=3}
else if(gf==ga){d=1;p=1}
else l=1;

if(data){
await supabase.from('player_rankings').update({
total_matches:data.total_matches+1,
wins:data.wins+w,
draws:data.draws+d,
losses:data.losses+l,
goals_for:data.goals_for+gf,
goals_against:data.goals_against+ga,
points:data.points+p
}).eq('player_id',id);
}else{
await supabase.from('player_rankings').insert({
player_id:id,
total_matches:1,
wins:w,draws:d,losses:l,
goals_for:gf,
goals_against:ga,
points:p
});
}

}

// 🔄 LIVE PREVIEW
document.getElementById('text').addEventListener('input', preview);

</script>

</body>
</html>
