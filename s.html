<!DOCTYPE html>
<html>
<head>
<title>Match Parser + Save</title>

<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px}
.box{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:10px}
textarea{width:100%;height:220px;margin-top:10px}
button{padding:10px 20px;background:#e94560;color:#fff;border:none;margin-top:10px;cursor:pointer}
.result{margin-top:20px}
.ok{color:green;font-weight:bold}
.bad{color:red;font-weight:bold}
.match{padding:8px;border-bottom:1px solid #eee}
</style>

</head>
<body>

<div class="box">

<h2>Match Submit System</h2>

<select id="source">
<option>In-club</option>
<option>Cobeg</option>
<option>Efob</option>
<option>Efcob</option>
<option>Befc</option>
</select>

<textarea id="text" placeholder="Paste full match text..."></textarea>

<br>
<button onclick="preview()">Preview</button>
<button onclick="save()">Save to DB</button>

<div id="previewBox" class="result"></div>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
'https://uwybeitqpnaqmcmqwbkv.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g'
);

let parsedGames = [];

// 🔍 PARSER
function parse(text){

let lines = text.split('\n');
let out = [];

lines.forEach(l=>{

if(l.includes('🆚')){

let clean = l.replace(/🔑|⚔️|—/g,'').trim();

// score match
let m = clean.match(/(.+)\s(\d+)\s*🆚\s*(\d+)\s(.+)/);

if(m){
out.push({
home:m[1].trim(),
hs:parseInt(m[2]),
as:parseInt(m[3]),
away:m[4].trim(),
played:true
});
return;
}

// no score
let p = clean.split('🆚');
if(p.length==2){
out.push({
home:p[0].trim(),
hs:null,
as:null,
away:p[1].trim(),
played:false
});
}

}

});

return out;
}

// 🔎 find player
async function findPlayer(name){
let {data} = await supabase.from('players').select('*');
return data.find(p=>p.player_name.toLowerCase().trim()===name.toLowerCase().trim());
}

// 👁️ PREVIEW
window.preview = async function(){

let txt = document.getElementById('text').value;

parsedGames = parse(txt);

let html = '';

for(let g of parsedGames){

let p1 = await findPlayer(g.home);
let p2 = await findPlayer(g.away);

html += `
<div class="match">
<span class="${p1?'ok':'bad'}">${g.home}</span>
${g.played ? g.hs + ' 🆚 ' + g.as : '🆚'}
<span class="${p2?'ok':'bad'}">${g.away}</span>
</div>`;
}

document.getElementById('previewBox').innerHTML = html || "❌ No matches found";
}

// 💾 SAVE
window.save = async function(){

let text = document.getElementById('text').value;
let source = document.getElementById('source').value;

if(parsedGames.length==0){
alert("Preview first!");
return;
}

// save raw
let raw = await supabase.from('match_raw')
.insert({source, full_text:text})
.select();

let matchId = raw.data[0].id;

// loop
for(let g of parsedGames){

if(!g.played) continue;

let p1 = await findPlayer(g.home);
let p2 = await findPlayer(g.away);

if(!p1 || !p2) continue;

// result
let r1 = g.hs>g.as?'win':g.hs==g.as?'draw':'lose';
let r2 = g.as>g.hs?'win':g.hs==g.as?'draw':'lose';

// save match
await supabase.from('match_player_results').insert([
{
match_id:matchId,
player_id:p1.id,
player_name:p1.player_name,
opponent_name:g.away,
goals_for:g.hs,
goals_against:g.as,
result:r1
},
{
match_id:matchId,
player_id:p2.id,
player_name:p2.player_name,
opponent_name:g.home,
goals_for:g.as,
goals_against:g.hs,
result:r2
}
]);

// update rank
await updateRank(p1.id,g.hs,g.as);
await updateRank(p2.id,g.as,g.hs);

}

alert("✅ SAVED TO DATABASE");
}

// 📊 RANK UPDATE
async function updateRank(id,gf,ga){

let {data} = await supabase.from('player_rankings')
.select('*')
.eq('player_id',id)
.maybeSingle();

let w=0,d=0,l=0,p=0;

if(gf>ga){w=1;p=3}
else if(gf==ga){d=1;p=1}
else l=1;

if(data){
await supabase.from('player_rankings').update({
total_matches:data.total_matches+1,
wins:data.wins+w,
draws:data.draws+d,
losses:data.losses+l,
goals_for:data.goals_for+gf,
goals_against:data.goals_against+ga,
points:data.points+p
}).eq('player_id',id);
}else{
await supabase.from('player_rankings').insert({
player_id:id,
total_matches:1,
wins:w,draws:d,losses:l,
goals_for:gf,
goals_against:ga,
points:p
});
}

}

</script>

</body>
</html>
