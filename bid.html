<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP Intra-Bid Tournament | Point Table</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .top-navbar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { font-size: 32px; }
        .logo-area h2 { font-size: 22px; font-weight: 700; color: #fff; }
        .logo-area span { color: #e94560; }
        .nav-links { display: flex; align-items: center; gap: 8px; }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            opacity: 0.8;
        }
        .nav-link:hover { background: rgba(255,255,255,0.1); opacity: 1; }
        .nav-link.active { background: #e94560; opacity: 1; }
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #fff;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        .main-content { padding: 40px; max-width: 1400px; margin: 0 auto; }
        .tournament-header { text-align: center; margin-bottom: 40px; }
        .tournament-badge {
            display: inline-block;
            background: rgba(233,69,96,0.2);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .tournament-header h1 { font-size: 42px; font-weight: 800; margin-bottom: 10px; }
        .tournament-header h1 span { color: #e94560; }
        .tournament-header p { color: #aaa; font-size: 16px; }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card i { font-size: 35px; color: #e94560; margin-bottom: 10px; }
        .stat-card h3 { font-size: 28px; font-weight: 700; }
        .stat-card p { font-size: 12px; color: #aaa; margin-top: 5px; }

        .point-table-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 40px;
        }
        .table-header {
            background: rgba(233,69,96,0.2);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .table-header h2 { font-size: 18px; font-weight: 600; }
        .table-header h2 i { margin-right: 10px; color: #e94560; }
        .point-table {
            width: 100%;
            border-collapse: collapse;
        }
        .point-table th, .point-table td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .point-table th {
            background: rgba(0,0,0,0.2);
            color: #e94560;
            font-weight: 600;
            font-size: 13px;
        }
        .point-table tr:hover { background: rgba(255,255,255,0.03); }
        .team-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
        }
        .team-logo {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(233,69,96,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA500); color: #1a1a2e; }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A9A9A9); color: #1a1a2e; }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #B87333); color: #1a1a2e; }

        .matches-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 40px;
        }
        .matches-section h2 { margin-bottom: 20px; font-size: 18px; }
        .matches-section h2 i { color: #e94560; margin-right: 10px; }
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        .match-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .match-card:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .match-teams { display: flex; align-items: center; gap: 10px; }
        .match-team { display: flex; align-items: center; gap: 8px; }
        .match-vs { color: #e94560; font-weight: 700; font-size: 12px; }
        .match-score { font-weight: 700; font-size: 16px; color: #fff; }
        .match-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
        }
        .match-status.played { background: rgba(46,204,113,0.2); color: #2ecc71; }
        .match-status.upcoming { background: rgba(241,196,15,0.2); color: #f1c40f; }

        .admin-panel {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .admin-panel h2 { margin-bottom: 20px; font-size: 18px; }
        .admin-panel h2 i { color: #e94560; margin-right: 10px; }
        .admin-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: end;
        }
        .admin-form select, .admin-form input {
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
        .admin-form button {
            padding: 12px 20px;
            background: #e94560;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .admin-form button:hover { background: #ff6b81; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .top-navbar { padding: 0 20px; }
            .nav-links {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                background: #1a1a2e;
                flex-direction: column;
                padding: 20px;
                transition: left 0.3s;
            }
            .nav-links.show { left: 0; }
            .mobile-menu-btn { display: block; }
            .main-content { padding: 20px; }
            .stats-cards { grid-template-columns: repeat(2, 1fr); }
            .tournament-header h1 { font-size: 28px; }
            .point-table th, .point-table td { padding: 10px 5px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <nav class="top-navbar">
        <div class="logo-area">
            <div class="logo-icon">🏴‍☠️</div>
            <h2>POP<span>123</span></h2>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="tournament.html" class="nav-link active"><i class="fas fa-trophy"></i> Tournament</a>
        </div>
        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </nav>

    <main class="main-content">
        <div class="tournament-header">
            <div class="tournament-badge"><i class="fas fa-fire"></i> Season 1</div>
            <h1>POP Intra-Bid <span>Tournament</span></h1>
            <p>5 Teams | Double Round Robin | Champion Takes All</p>
        </div>

        <div class="stats-cards">
            <div class="stat-card"><i class="fas fa-users"></i><h3 id="totalTeams">5</h3><p>Total Teams</p></div>
            <div class="stat-card"><i class="fas fa-futbol"></i><h3 id="totalMatches">0</h3><p>Matches Played</p></div>
            <div class="stat-card"><i class="fas fa-trophy"></i><h3 id="topTeam">-</h3><p>Top Team</p></div>
            <div class="stat-card"><i class="fas fa-chart-line"></i><h3 id="avgGoals">0</h3><p>Avg Goals/Match</p></div>
        </div>

        <div class="point-table-container">
            <div class="table-header"><h2><i class="fas fa-table"></i> POINT TABLE</h2></div>
            <table class="point-table">
                <thead><tr><th>#</th><th>Team</th><th>M</th><th>W</th><th>L</th><th>D</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="matches-section">
            <h2><i class="fas fa-calendar-alt"></i> Match Schedule & Results</h2>
            <div class="matches-grid" id="matchesGrid"></div>
        </div>

        <div class="admin-panel">
            <h2><i class="fas fa-user-shield"></i> Admin Panel - Update Match Result</h2>
            <div class="admin-form">
                <select id="matchSelect"><option value="">Select Match</option></select>
                <input type="number" id="team1Score" placeholder="Team 1 Score" min="0">
                <input type="number" id="team2Score" placeholder="Team 2 Score" min="0">
                <button id="updateMatchBtn"><i class="fas fa-save"></i> Update Result</button>
                <button id="resetBtn" style="background:#ff4757;"><i class="fas fa-trash"></i> Reset Tournament</button>
            </div>
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const supabaseUrl = 'https://uwybeitqpnaqmcmqwbkv.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g';
        const supabase = createClient(supabaseUrl, supabaseAnonKey);

        let teams = [];
        let matches = [];
        let stats = [];

        // Load data from Supabase
        async function loadTeams() {
            const { data, error } = await supabase.from('tournament_teams').select('*');
            if (!error && data) teams = data;
            else console.error('Teams load error:', error);
        }

        async function loadMatches() {
            const { data, error } = await supabase.from('tournament_matches').select('*');
            if (!error && data) matches = data;
            else console.error('Matches load error:', error);
        }

        async function loadStats() {
            const { data, error } = await supabase.from('tournament_stats').select('*');
            if (!error && data) stats = data;
            else console.error('Stats load error:', error);
        }

        // Save match to Supabase
        async function saveMatch(match) {
            const { error } = await supabase.from('tournament_matches').upsert(match);
            if (error) console.error('Save match error:', error);
        }

        // Save stats to Supabase
        async function saveStats(teamStats) {
            const { error } = await supabase.from('tournament_stats').upsert(teamStats);
            if (error) console.error('Save stats error:', error);
        }

        // Calculate stats from matches
        function calculateStats() {
            const teamStats = {};
            teams.forEach(team => {
                teamStats[team.id] = {
                    team_id: team.id,
                    matches: 0, wins: 0, losses: 0, draws: 0, gf: 0, ga: 0, gd: 0, pts: 0
                };
            });

            matches.forEach(match => {
                if (match.team1_score !== null && match.team2_score !== null) {
                    const t1 = teamStats[match.team1_id];
                    const t2 = teamStats[match.team2_id];
                    
                    t1.matches++; t2.matches++;
                    t1.gf += match.team1_score; t1.ga += match.team2_score;
                    t2.gf += match.team2_score; t2.ga += match.team1_score;
                    
                    if (match.team1_score > match.team2_score) {
                        t1.wins++; t2.losses++; t1.pts += 3;
                    } else if (match.team2_score > match.team1_score) {
                        t2.wins++; t1.losses++; t2.pts += 3;
                    } else {
                        t1.draws++; t2.draws++; t1.pts += 1; t2.pts += 1;
                    }
                }
            });

            teams.forEach(team => {
                teamStats[team.id].gd = teamStats[team.id].gf - teamStats[team.id].ga;
            });
            
            return Object.values(teamStats);
        }

        // Render UI
        function renderPointTable(teamStats) {
            const sorted = [...teamStats].sort((a, b) => {
                if (b.pts !== a.pts) return b.pts - a.pts;
                if (b.gd !== a.gd) return b.gd - a.gd;
                return b.gf - a.gf;
            });

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = sorted.map((s, idx) => {
                const team = teams.find(t => t.id === s.team_id);
                let rankClass = idx === 0 ? 'rank-1' : (idx === 1 ? 'rank-2' : (idx === 2 ? 'rank-3' : ''));
                return `<tr>
                    <td><span class="team-logo ${rankClass}">${idx + 1}</span></td>
                    <td><div class="team-cell"><span class="team-logo" style="background:${team?.team_color}20;">${team?.team_logo}</span> ${team?.team_name}</div></td>
                    <td>${s.matches}</td><td>${s.wins}</td><td>${s.losses}</td><td>${s.draws}</td>
                    <td>${s.gf}</td><td>${s.ga}</td>
                    <td style="color:${s.gd >= 0 ? '#2ecc71' : '#e74c3c'}">${s.gd >= 0 ? '+' : ''}${s.gd}</td>
                    <td><strong>${s.pts}</strong></td>
                </tr>`;
            }).join('');

            const totalPlayed = matches.filter(m => m.team1_score !== null).length;
            document.getElementById('totalMatches').innerText = totalPlayed;
            if (sorted[0]) {
                const topTeam = teams.find(t => t.id === sorted[0].team_id);
                document.getElementById('topTeam').innerText = topTeam?.team_name.substring(0, 10) || '-';
            }
            const totalGoals = teamStats.reduce((sum, s) => sum + s.gf, 0);
            document.getElementById('avgGoals').innerText = totalPlayed > 0 ? (totalGoals / totalPlayed).toFixed(1) : 0;
        }

        function renderMatches() {
            const container = document.getElementById('matchesGrid');
            container.innerHTML = matches.map(match => {
                const team1 = teams.find(t => t.id === match.team1_id);
                const team2 = teams.find(t => t.id === match.team2_id);
                const isPlayed = match.team1_score !== null;
                const scoreDisplay = isPlayed ? `${match.team1_score} - ${match.team2_score}` : 'vs';
                const statusClass = isPlayed ? 'played' : 'upcoming';
                const statusText = isPlayed ? 'Played' : 'Upcoming';
                return `<div class="match-card">
                    <div class="match-teams">
                        <div class="match-team"><span class="team-logo" style="background:${team1?.team_color}20;">${team1?.team_logo}</span> ${team1?.team_short}</div>
                        <span class="match-vs">VS</span>
                        <div class="match-team">${team2?.team_short} <span class="team-logo" style="background:${team2?.team_color}20;">${team2?.team_logo}</span></div>
                    </div>
                    <div class="match-score">${scoreDisplay}</div>
                    <div class="match-status ${statusClass}">${statusText}</div>
                </div>`;
            }).join('');
        }

        function renderMatchSelect() {
            const select = document.getElementById('matchSelect');
            select.innerHTML = '<option value="">Select Match</option>' + matches.map((match, idx) => {
                const team1 = teams.find(t => t.id === match.team1_id);
                const team2 = teams.find(t => t.id === match.team2_id);
                const status = match.team1_score !== null ? `(${match.team1_score}-${match.team2_score})` : 'Not Played';
                return `<option value="${idx}">${team1?.team_name} vs ${team2?.team_name} ${status}</option>`;
            }).join('');
        }

        // Update match result
        async function updateMatchResult(matchIndex, score1, score2) {
            if (matchIndex < 0 || matchIndex >= matches.length) return false;
            
            matches[matchIndex].team1_score = parseInt(score1);
            matches[matchIndex].team2_score = parseInt(score2);
            matches[matchIndex].winner_id = score1 > score2 ? matches[matchIndex].team1_id : (score2 > score1 ? matches[matchIndex].team2_id : null);
            matches[matchIndex].status = "played";
            
            await saveMatch(matches[matchIndex]);
            
            const updatedStats = calculateStats();
            for (const stat of updatedStats) {
                await saveStats(stat);
            }
            
            await loadStats();
            const freshStats = calculateStats();
            renderPointTable(freshStats);
            renderMatches();
            renderMatchSelect();
            return true;
        }

        // Create default matches (Double Round Robin)
        function createDefaultMatches() {
            const newMatches = [];
            for (let i = 0; i < teams.length; i++) {
                for (let j = i + 1; j < teams.length; j++) {
                    newMatches.push({ team1_id: teams[i].id, team2_id: teams[j].id, team1_score: null, team2_score: null, winner_id: null, status: 'upcoming', round: 1 });
                    newMatches.push({ team1_id: teams[j].id, team2_id: teams[i].id, team1_score: null, team2_score: null, winner_id: null, status: 'upcoming', round: 2 });
                }
            }
            return newMatches;
        }

        async function resetTournament() {
            if (!confirm('Are you sure? All match results will be deleted!')) return;
            
            const defaultMatches = createDefaultMatches();
            for (let i = 0; i < defaultMatches.length; i++) {
                await supabase.from('tournament_matches').upsert({ id: matches[i]?.id, ...defaultMatches[i] });
            }
            
            const resetStats = teams.map(team => ({
                team_id: team.id, matches: 0, wins: 0, losses: 0, draws: 0, gf: 0, ga: 0, gd: 0, pts: 0
            }));
            for (const stat of resetStats) await saveStats(stat);
            
            await loadMatches();
            await loadStats();
            const freshStats = calculateStats();
            renderPointTable(freshStats);
            renderMatches();
            renderMatchSelect();
            alert('Tournament reset successfully!');
        }

        // Initialize
        async function init() {
            await loadTeams();
            await loadMatches();
            await loadStats();
            
            if (matches.length === 0) {
                const defaultMatches = createDefaultMatches();
                for (const match of defaultMatches) await saveMatch(match);
                await loadMatches();
            }
            
            const teamStats = calculateStats();
            renderPointTable(teamStats);
            renderMatches();
            renderMatchSelect();
        }

        // Event listeners
        document.getElementById('updateMatchBtn').addEventListener('click', async () => {
            const matchIndex = parseInt(document.getElementById('matchSelect').value);
            const score1 = document.getElementById('team1Score').value;
            const score2 = document.getElementById('team2Score').value;
            
            if (isNaN(matchIndex)) { alert('Please select a match'); return; }
            if (score1 === "" || score2 === "") { alert('Please enter both scores'); return; }
            
            await updateMatchResult(matchIndex, score1, score2);
            document.getElementById('team1Score').value = '';
            document.getElementById('team2Score').value = '';
            alert('Match result updated and saved to database!');
        });

        document.getElementById('resetBtn')?.addEventListener('click', resetTournament);
        document.getElementById('logoutBtn').addEventListener('click', () => window.location.href = 'index.html');
        
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinks');
        if (mobileMenuBtn) mobileMenuBtn.addEventListener('click', () => navLinks.classList.toggle('show'));
        
        init();
    </script>
</body>
</html>
