<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP Intra-Bid Tournament | Point Table</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        /* Top Navbar */
        .top-navbar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 70px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon { font-size: 32px; }
        .logo-area h2 { font-size: 22px; font-weight: 700; color: #fff; }
        .logo-area span { color: #e94560; }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            opacity: 0.8;
        }

        .nav-link:hover { background: rgba(255,255,255,0.1); opacity: 1; }
        .nav-link.active { background: #e94560; opacity: 1; }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #fff;
        }

        /* Main Content */
        .main-content {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Tournament Header */
        .tournament-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .tournament-badge {
            display: inline-block;
            background: rgba(233,69,96,0.2);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .tournament-header h1 {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .tournament-header h1 span {
            color: #e94560;
        }
        .tournament-header p {
            color: #aaa;
            font-size: 16px;
        }

        /* Stats Cards */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card i {
            font-size: 35px;
            color: #e94560;
            margin-bottom: 10px;
        }
        .stat-card h3 {
            font-size: 28px;
            font-weight: 700;
        }
        .stat-card p {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        /* Point Table */
        .point-table-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 40px;
        }
        .table-header {
            background: rgba(233,69,96,0.2);
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .table-header h2 {
            font-size: 18px;
            font-weight: 600;
        }
        .table-header h2 i {
            margin-right: 10px;
            color: #e94560;
        }
        .point-table {
            width: 100%;
            border-collapse: collapse;
        }
        .point-table th,
        .point-table td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .point-table th {
            background: rgba(0,0,0,0.2);
            color: #e94560;
            font-weight: 600;
            font-size: 13px;
        }
        .point-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        .team-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
        }
        .team-logo {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: rgba(233,69,96,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA500); color: #1a1a2e; }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A9A9A9); color: #1a1a2e; }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #B87333); color: #1a1a2e; }

        /* Match Schedule */
        .matches-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .matches-section h2 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .matches-section h2 i {
            color: #e94560;
            margin-right: 10px;
        }
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }
        .match-card {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .match-card:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(5px);
        }
        .match-teams {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .match-team {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .match-vs {
            color: #e94560;
            font-weight: 700;
            font-size: 12px;
        }
        .match-score {
            font-weight: 700;
            font-size: 16px;
            color: #fff;
        }
        .match-status {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(46,204,113,0.2);
            color: #2ecc71;
        }
        .match-status.played {
            background: rgba(46,204,113,0.2);
            color: #2ecc71;
        }
        .match-status.upcoming {
            background: rgba(241,196,15,0.2);
            color: #f1c40f;
        }

        /* Admin Panel */
        .admin-panel {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 40px;
        }
        .admin-panel h2 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .admin-panel h2 i {
            color: #e94560;
            margin-right: 10px;
        }
        .admin-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: end;
        }
        .admin-form select, .admin-form input {
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }
        .admin-form button {
            padding: 12px 20px;
            background: #e94560;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .admin-form button:hover {
            background: #ff6b81;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .top-navbar { padding: 0 20px; }
            .nav-links {
                position: fixed;
                top: 70px;
                left: -100%;
                width: 100%;
                background: #1a1a2e;
                flex-direction: column;
                padding: 20px;
                transition: left 0.3s;
            }
            .nav-links.show { left: 0; }
            .mobile-menu-btn { display: block; }
            .main-content { padding: 20px; }
            .stats-cards { grid-template-columns: repeat(2, 1fr); }
            .tournament-header h1 { font-size: 28px; }
            .point-table th, .point-table td { padding: 10px 5px; font-size: 12px; }
            .team-logo { width: 25px; height: 25px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <nav class="top-navbar">
        <div class="logo-area">
            <div class="logo-icon">🏴‍☠️</div>
            <h2>POP<span>123</span></h2>
        </div>
        <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="dashboard.html" class="nav-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <a href="tournament.html" class="nav-link active"><i class="fas fa-trophy"></i> Tournament</a>
            <a href="leaderboard.html" class="nav-link"><i class="fas fa-chart-line"></i> Leaderboard</a>
        </div>
        <div class="auth-buttons">
            <button id="logoutBtn" class="logout-btn" style="background:rgba(255,255,255,0.1); border:none; padding:8px 16px; border-radius:10px; color:white; cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </nav>

    <main class="main-content">
        <div class="tournament-header">
            <div class="tournament-badge"><i class="fas fa-fire"></i> Season 1</div>
            <h1>POP Intra-Bid <span>Tournament</span></h1>
            <p>5 Teams | Double Round Robin | Champion Takes All</p>
        </div>

        <div class="stats-cards">
            <div class="stat-card"><i class="fas fa-users"></i><h3 id="totalTeams">5</h3><p>Total Teams</p></div>
            <div class="stat-card"><i class="fas fa-futbol"></i><h3 id="totalMatches">0</h3><p>Matches Played</p></div>
            <div class="stat-card"><i class="fas fa-trophy"></i><h3 id="topTeam">-</h3><p>Top Team</p></div>
            <div class="stat-card"><i class="fas fa-chart-line"></i><h3 id="avgGoals">0</h3><p>Avg Goals/Match</p></div>
        </div>

        <!-- Point Table -->
        <div class="point-table-container">
            <div class="table-header">
                <h2><i class="fas fa-table"></i> POINT TABLE</h2>
            </div>
            <table class="point-table" id="pointTable">
                <thead>
                    <tr>
                        <th>#</th><th>Team</th><th>M</th><th>W</th><th>L</th><th>D</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <!-- Match Schedule -->
        <div class="matches-section">
            <h2><i class="fas fa-calendar-alt"></i> Match Schedule & Results</h2>
            <div class="matches-grid" id="matchesGrid"></div>
        </div>

        <!-- Admin Panel -->
        <div class="admin-panel">
            <h2><i class="fas fa-user-shield"></i> Admin Panel - Update Match Result</h2>
            <div class="admin-form">
                <select id="matchSelect">
                    <option value="">Select Match</option>
                </select>
                <input type="number" id="team1Score" placeholder="Team 1 Score" min="0">
                <input type="number" id="team2Score" placeholder="Team 2 Score" min="0">
                <button id="updateMatchBtn"><i class="fas fa-save"></i> Update Result</button>
            </div>
        </div>
    </main>

    <script>
        // Teams Data
        const teams = [
            { id: 1, name: "Team Flame", short: "FLM", logo: "🔥", color: "#ff6b6b" },
            { id: 2, name: "Blaze Titans", short: "BLZ", logo: "⚡", color: "#ffa502" },
            { id: 3, name: "NOT HUMANS", short: "NTH", logo: "👾", color: "#a4b0be" },
            { id: 4, name: "DEAD FOR SURE", short: "DFS", logo: "💀", color: "#747d8c" },
            { id: 5, name: "BORN2WIN", short: "B2W", logo: "🏆", color: "#2ed573" }
        ];

        // Initialize team stats
        let teamStats = {};
        teams.forEach(team => {
            teamStats[team.id] = {
                id: team.id,
                name: team.name,
                short: team.short,
                logo: team.logo,
                matches: 0,
                wins: 0,
                losses: 0,
                draws: 0,
                gf: 0,
                ga: 0,
                gd: 0,
                pts: 0
            };
        });

        // Matches array
        let matches = [];

        // Create all matches (Double Round Robin)
        function createAllMatches() {
            matches = [];
            // Home and Away matches
            for (let i = 0; i < teams.length; i++) {
                for (let j = i + 1; j < teams.length; j++) {
                    // Home match
                    matches.push({
                        id: matches.length + 1,
                        team1_id: teams[i].id,
                        team2_id: teams[j].id,
                        team1_score: null,
                        team2_score: null,
                        winner_id: null,
                        status: "upcoming",
                        round: 1
                    });
                    // Away match
                    matches.push({
                        id: matches.length + 1,
                        team1_id: teams[j].id,
                        team2_id: teams[i].id,
                        team1_score: null,
                        team2_score: null,
                        winner_id: null,
                        status: "upcoming",
                        round: 2
                    });
                }
            }
            saveToLocalStorage();
        }

        // Save to localStorage
        function saveToLocalStorage() {
            localStorage.setItem('tournament_matches', JSON.stringify(matches));
            localStorage.setItem('tournament_stats', JSON.stringify(teamStats));
        }

        // Load from localStorage
        function loadFromLocalStorage() {
            const savedMatches = localStorage.getItem('tournament_matches');
            const savedStats = localStorage.getItem('tournament_stats');
            if (savedMatches) matches = JSON.parse(savedMatches);
            if (savedStats) teamStats = JSON.parse(savedStats);
            if (matches.length === 0) createAllMatches();
        }

        // Update stats based on match results
        function updateStats() {
            // Reset stats
            teams.forEach(team => {
                teamStats[team.id] = {
                    ...teamStats[team.id],
                    matches: 0, wins: 0, losses: 0, draws: 0, gf: 0, ga: 0, gd: 0, pts: 0
                };
            });

            // Calculate stats from matches
            matches.forEach(match => {
                if (match.team1_score !== null && match.team2_score !== null) {
                    const t1 = teamStats[match.team1_id];
                    const t2 = teamStats[match.team2_id];
                    
                    t1.matches++;
                    t2.matches++;
                    t1.gf += match.team1_score;
                    t1.ga += match.team2_score;
                    t2.gf += match.team2_score;
                    t2.ga += match.team1_score;
                    
                    if (match.team1_score > match.team2_score) {
                        t1.wins++;
                        t2.losses++;
                        t1.pts += 3;
                    } else if (match.team2_score > match.team1_score) {
                        t2.wins++;
                        t1.losses++;
                        t2.pts += 3;
                    } else {
                        t1.draws++;
                        t2.draws++;
                        t1.pts += 1;
                        t2.pts += 1;
                    }
                }
            });

            // Calculate GD
            teams.forEach(team => {
                teamStats[team.id].gd = teamStats[team.id].gf - teamStats[team.id].ga;
            });
        }

        // Render Point Table
        function renderPointTable() {
            const sortedTeams = [...teams].sort((a, b) => {
                if (teamStats[b.id].pts !== teamStats[a.id].pts) return teamStats[b.id].pts - teamStats[a.id].pts;
                if (teamStats[b.id].gd !== teamStats[a.id].gd) return teamStats[b.id].gd - teamStats[a.id].gd;
                return teamStats[b.id].gf - teamStats[a.id].gf;
            });

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = sortedTeams.map((team, idx) => {
                const s = teamStats[team.id];
                let rankClass = '';
                if (idx === 0) rankClass = 'rank-1';
                else if (idx === 1) rankClass = 'rank-2';
                else if (idx === 2) rankClass = 'rank-3';
                
                return `<tr>
                    <td><span class="team-logo ${rankClass}">${idx + 1}</span></td>
                    <td><div class="team-cell"><span class="team-logo" style="background:${team.color}20;">${team.logo}</span> ${team.name}</div></td>
                    <td>${s.matches}</td>
                    <td>${s.wins}</td>
                    <td>${s.losses}</td>
                    <td>${s.draws}</td>
                    <td>${s.gf}</td>
                    <td>${s.ga}</td>
                    <td style="color:${s.gd >= 0 ? '#2ecc71' : '#e74c3c'}">${s.gd >= 0 ? '+' : ''}${s.gd}</td>
                    <td><strong>${s.pts}</strong></td>
                </tr>`;
            }).join('');

            // Update stats cards
            const totalPlayed = matches.filter(m => m.team1_score !== null).length;
            document.getElementById('totalMatches').innerText = totalPlayed;
            if (sortedTeams[0]) document.getElementById('topTeam').innerText = sortedTeams[0].name.substring(0, 10);
            
            const totalGoals = teams.reduce((sum, t) => sum + teamStats[t.id].gf, 0);
            const avgGoals = totalPlayed > 0 ? (totalGoals / totalPlayed).toFixed(1) : 0;
            document.getElementById('avgGoals').innerText = avgGoals;
        }

        // Render Matches
        function renderMatches() {
            const container = document.getElementById('matchesGrid');
            container.innerHTML = matches.map(match => {
                const team1 = teams.find(t => t.id === match.team1_id);
                const team2 = teams.find(t => t.id === match.team2_id);
                const isPlayed = match.team1_score !== null;
                const scoreDisplay = isPlayed ? `${match.team1_score} - ${match.team2_score}` : 'vs';
                const statusClass = isPlayed ? 'played' : 'upcoming';
                const statusText = isPlayed ? 'Played' : 'Upcoming';
                
                return `<div class="match-card">
                    <div class="match-teams">
                        <div class="match-team"><span class="team-logo" style="background:${team1.color}20;">${team1.logo}</span> ${team1.short}</div>
                        <span class="match-vs">VS</span>
                        <div class="match-team">${team2.short} <span class="team-logo" style="background:${team2.color}20;">${team2.logo}</span></div>
                    </div>
                    <div class="match-score">${scoreDisplay}</div>
                    <div class="match-status ${statusClass}">${statusText}</div>
                </div>`;
            }).join('');
        }

        // Render Match Select dropdown
        function renderMatchSelect() {
            const select = document.getElementById('matchSelect');
            select.innerHTML = '<option value="">Select Match</option>' + matches.map((match, idx) => {
                const team1 = teams.find(t => t.id === match.team1_id);
                const team2 = teams.find(t => t.id === match.team2_id);
                const status = match.team1_score !== null ? `(${match.team1_score}-${match.team2_score})` : 'Not Played';
                return `<option value="${idx}">${team1.name} vs ${team2.name} ${status}</option>`;
            }).join('');
        }

        // Update match result
        function updateMatchResult(matchIndex, score1, score2) {
            if (matchIndex === null || matchIndex < 0 || matchIndex >= matches.length) return false;
            
            matches[matchIndex].team1_score = parseInt(score1);
            matches[matchIndex].team2_score = parseInt(score2);
            matches[matchIndex].winner_id = score1 > score2 ? matches[matchIndex].team1_id : (score2 > score1 ? matches[matchIndex].team2_id : null);
            matches[matchIndex].status = "played";
            
            saveToLocalStorage();
            updateStats();
            renderPointTable();
            renderMatches();
            renderMatchSelect();
            return true;
        }

        // Reset tournament
        function resetTournament() {
            if (confirm('Are you sure you want to reset the entire tournament? All match results will be deleted!')) {
                createAllMatches();
                updateStats();
                renderPointTable();
                renderMatches();
                renderMatchSelect();
            }
        }

        // Event Listeners
        document.getElementById('updateMatchBtn').addEventListener('click', () => {
            const matchIndex = document.getElementById('matchSelect').value;
            const score1 = document.getElementById('team1Score').value;
            const score2 = document.getElementById('team2Score').value;
            
            if (matchIndex === "") {
                alert('Please select a match');
                return;
            }
            if (score1 === "" || score2 === "") {
                alert('Please enter both scores');
                return;
            }
            
            updateMatchResult(parseInt(matchIndex), score1, score2);
            document.getElementById('team1Score').value = '';
            document.getElementById('team2Score').value = '';
            alert('Match result updated successfully!');
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });

        // Mobile menu
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinks');
        if (mobileMenuBtn) {
            mobileMenuBtn.addEventListener('click', () => navLinks.classList.toggle('show'));
        }

        // Initialize
        loadFromLocalStorage();
        updateStats();
        renderPointTable();
        renderMatches();
        renderMatchSelect();
    </script>
</body>
</html>
