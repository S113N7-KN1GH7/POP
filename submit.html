
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POP Match Submit FIXED</title>

<style>
body{font-family:Arial;background:#f5f7fb;padding:20px}
.container{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:15px}
select,input{width:100%;padding:10px;margin:5px 0}
button{padding:12px;background:#e94560;color:#fff;border:none;border-radius:8px;width:100%}
.row{display:grid;grid-template-columns:1fr 80px 1fr 80px;gap:10px;margin:10px 0}
#msg{margin-top:10px;font-weight:bold}
</style>
</head>

<body>

<div class="container">

<h2>Match Submit (FIXED SYSTEM)</h2>

<select id="team1"></select>
<select id="team2"></select>

<input type="number" id="score1" placeholder="Team 1 Score">
<input type="number" id="score2" placeholder="Team 2 Score">

<div id="players"></div>

<button id="submitBtn">Submit Match</button>

<p id="msg"></p>

</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
'https://uwybeitqpnaqmcmqwbkv.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g'
);
const tournamentName = "pop intra bid s-01";

let clubs=[];

// ---------------- LOAD TEAMS ----------------
async function loadTeams(){

const {data,error} = await supabase.from('clubs').select('*').order('team_name');

if(error){
console.error(error);
msg.innerText="❌ Clubs load error";
return;
}

clubs=data;

let opt='<option value="">Select Team</option>';
clubs.forEach(c=>{
opt+=`<option value="${c.id}">${c.team_name}</option>`;
});

team1.innerHTML=opt;
team2.innerHTML=opt;
}

// ---------------- LOAD PLAYERS ----------------
async function loadPlayers(teamId){

const {data,error}=await supabase
.from('players')
.select('*')
.eq('club_id',teamId);

if(error){
console.error(error);
return [];
}

return data||[];
}

// ---------------- RENDER PLAYERS ----------------
async function renderPlayers(){

if(!team1.value || !team2.value){
players.innerHTML="Select teams first";
return;
}

let p1=await loadPlayers(team1.value);
let p2=await loadPlayers(team2.value);

let o1='<option>Player</option>';
let o2='<option>Player</option>';

p1.forEach(p=>o1+=`<option>${p.player_name}</option>`);
p2.forEach(p=>o2+=`<option>${p.player_name}</option>`);

let html='';

for(let i=0;i<5;i++){
html+=`
<div class="row">
<select class="p1">${o1}</select>
<input type="number" class="s1" value="0">
<select class="p2">${o2}</select>
<input type="number" class="s2" value="0">
</div>`;
}

players.innerHTML=html;
}

// ---------------- CLUB UPDATE (NAME SAFE) ----------------
async function updateClub(name,my,opp){

const {data,error}=await supabase
.from('clubs')
.select('*')
.ilike('team_name',name.trim());

if(error) throw error;

if(!data || data.length===0){
throw new Error("Club not found: "+name);
}

let c=data[0];

let w=0,d=0,l=0,p=0;

if(my>opp){w=1;p=3}
else if(my==opp){d=1;p=1}
else l=1;

const res=await supabase.from('clubs')
.update({
win:c.win+w,
draw:c.draw+d,
loss:c.loss+l,
gf:c.gf+my,
ga:c.ga+opp,
pts:c.pts+p
})
.eq('id',c.id);

console.log("CLUB UPDATE:",res);

if(res.error) throw res.error;
if(res.status>=400) throw new Error("Club update failed");
}

// ---------------- TOURNAMENT UPDATE ----------------
async function updateTournament(name,my,opp){

const cleanName = name.trim();

const {data,error} = await supabase
.from('tournament_teams')
.select('*')
.eq('tournament_name', tournamentName);

if(error) throw error;

console.log("ALL TOURNAMENT ROWS:", data);

if(!data || data.length===0){
throw new Error("❌ tournament table empty");
}

// 🔥 manually find match (SAFE METHOD)
let match = data.find(t =>
t.team_name?.trim().toLowerCase() === cleanName.toLowerCase()
);

console.log("MATCHED ROW:", match);

if(!match){
throw new Error("❌ NO MATCH FOUND FOR TEAM: " + cleanName);
}

let w=0,d=0,l=0,p=0;

if(my>opp){w=1;p=3}
else if(my==opp){d=1;p=1}
else l=1;

const res = await supabase
.from('tournament_teams')
.update({
matches_played: match.matches_played + 1,
wins: match.wins + w,
draws: match.draws + d,
losses: match.losses + l,
goals_for: match.goals_for + my,
goals_against: match.goals_against + opp,
points: match.points + p
})
.eq('id', match.id)
.select();

console.log("UPDATE RESULT:", res);

if(res.error) throw res.error;

if(!res.data || res.data.length===0){
throw new Error("❌ UPDATE BLOCKED (RLS or ID issue)");
}
}
// ---------------- PLAYER UPDATE ----------------
async function updatePlayer(name,my,opp){

const {data}=await supabase
.from('players')
.select('*')
.ilike('player_name',name.trim());

if(!data || data.length===0) return;

let p=data[0];

let w=0,d=0,l=0,pts=0;

if(my>opp){w=1;pts=3}
else if(my==opp){d=1;pts=1}
else l=1;

await supabase.from('players')
.update({
win:p.win+w,
draw:p.draw+d,
loss:p.loss+l,
gf:p.gf+my,
ga:p.ga+opp,
pts:p.pts+pts
})
.eq('id',p.id);
}

// ---------------- SUBMIT ----------------
async function submitMatch(){

msg.innerText="⏳ Processing...";

try{

let t1=team1.value;
let t2=team2.value;

if(!t1||!t2){
msg.innerText="Select teams";
return;
}

let name1=clubs.find(c=>c.id==t1).team_name;
let name2=clubs.find(c=>c.id==t2).team_name;

let s1=parseInt(score1.value)||0;
let s2=parseInt(score2.value)||0;

console.log("MATCH:",name1,s1,"VS",name2,s2);

// TEAM + CLUB + TOURNAMENT
await updateTournament(name1,s1,s2);
await updateTournament(name2,s2,s1);

await updateClub(name1,s1,s2);
await updateClub(name2,s2,s1);

// PLAYERS
let rows=document.querySelectorAll('.row');

for(let r of rows){

let p1=r.querySelector('.p1').value;
let p2=r.querySelector('.p2').value;

let ps1=parseInt(r.querySelector('.s1').value)||0;
let ps2=parseInt(r.querySelector('.s2').value)||0;

if(p1) await updatePlayer(p1,ps1,ps2);
if(p2) await updatePlayer(p2,ps2,ps1);
}

msg.innerText="✅ MATCH SAVED SUCCESSFULLY";

}catch(err){
console.error(err);
msg.innerText="❌ ERROR: "+err.message;
}
}

// EVENTS
submitBtn.onclick=submitMatch;
team1.onchange=renderPlayers;
team2.onchange=renderPlayers;

// INIT
loadTeams();

</script>

</body>
</html>
