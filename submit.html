<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POP Match Submit</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{font-family:Inter;background:#f5f7fb;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:15px}
select,input{width:100%;padding:10px;margin-top:5px;margin-bottom:10px}
button{padding:12px;background:#e94560;color:#fff;border:none;border-radius:10px;cursor:pointer}
.row{display:grid;grid-template-columns:1fr 80px 1fr;gap:10px;margin-bottom:10px}
</style>
</head>

<body>

<div class="container">
<h2>Match Submit</h2>

<select id="team1"></select>
<select id="team2"></select>

<input type="number" id="score1" placeholder="Team1 Score">
<input type="number" id="score2" placeholder="Team2 Score">

<div id="players"></div>

<button onclick="submitMatch()">Submit</button>

<p id="msg"></p>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
'https://uwybeitqpnaqmcmqwbkv.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g'
);

let clubs = [];
let p1 = [], p2 = [];
let rows = 5;

const tournamentName = "pop intra bid s-01";

async function loadTeams(){
let {data} = await supabase.from('clubs').select('*').order('team_name');

clubs = data;

let opt = '<option value="">Select Team</option>';
data.forEach(t=>{
opt += `<option value="${t.id}">${t.team_name}</option>`;
});

team1.innerHTML = opt;
team2.innerHTML = opt;
}

async function loadPlayers(teamId){
let {data} = await supabase.from('players')
.select('*')
.eq('club_id',teamId)
.order('player_name');

return data || [];
}

async function renderPlayers(){

let t1 = team1.value;
let t2 = team2.value;

if(!t1 || !t2){
players.innerHTML = "Select teams";
return;
}

p1 = await loadPlayers(t1);
p2 = await loadPlayers(t2);

let opt1 = '<option>Player</option>';
let opt2 = '<option>Player</option>';

p1.forEach(p=> opt1 += `<option>${p.player_name}</option>`);
p2.forEach(p=> opt2 += `<option>${p.player_name}</option>`);

let html = '';

for(let i=0;i<rows;i++){
html += `
<div class="row">
<select class="p1">${opt1}</select>
<input type="number" class="s1" value="0">
<select class="p2">${opt2}</select>
<input type="number" class="s2" value="0">
</div>
`;
}

players.innerHTML = html;
}

async function updateTournament(name,my,opp){

let {data} = await supabase.from('tournament_teams')
.select('*')
.eq('team_name',name)
.eq('tournament_name',tournamentName)
.maybeSingle();

let w=0,d=0,l=0,p=0;

if(my>opp){w=1;p=3}
else if(my==opp){d=1;p=1}
else l=1;

if(data){
await supabase.from('tournament_teams').update({
matches_played:data.matches_played+1,
wins:data.wins+w,
draws:data.draws+d,
losses:data.losses+l,
goals_for:data.goals_for+my,
goals_against:data.goals_against+opp,
points:data.points+p
})
.eq('team_name',name)
.eq('tournament_name',tournamentName);
}else{
await supabase.from('tournament_teams').insert({
id:crypto.randomUUID(),
team_name:name,
tournament_name:tournamentName,
matches_played:1,
wins:w,draws:d,losses:l,
goals_for:my,
goals_against:opp,
points:p
});
}

}

async function updateClub(name,my,opp){

let {data} = await supabase.from('clubs')
.select('*')
.eq('team_name',name)
.maybeSingle();

if(!data) return;

let w=0,d=0,l=0,p=0;

if(my>opp){w=1;p=3}
else if(my==opp){d=1;p=1}
else l=1;

await supabase.from('clubs').update({
win:data.win+w,
draw:data.draw+d,
loss:data.loss+l,
gf:data.gf+my,
ga:data.ga+opp,
pts:data.pts+p
})
.eq('team_name',name);

}

async function updatePlayer(name,my,opp){

let {data} = await supabase.from('players')
.select('*')
.eq('player_name',name)
.maybeSingle();

if(!data) return;

let w=0,d=0,l=0,p=0;

if(my>opp){w=1;p=3}
else if(my==opp){d=1;p=1}
else l=1;

await supabase.from('players').update({
win:data.win+w,
draw:data.draw+d,
loss:data.loss+l,
gf:data.gf+my,
ga:data.ga+opp,
pts:data.pts+p
})
.eq('player_name',name);

}

async function submitMatch(){

let t1 = team1.value;
let t2 = team2.value;

if(!t1 || !t2){
msg.innerText = "Select teams";
return;
}

let name1 = clubs.find(c=>c.id==t1).team_name;
let name2 = clubs.find(c=>c.id==t2).team_name;

let s1 = parseInt(score1.value)||0;
let s2 = parseInt(score2.value)||0;

// teams
await updateTournament(name1,s1,s2);
await updateTournament(name2,s2,s1);

// clubs
await updateClub(name1,s1,s2);
await updateClub(name2,s2,s1);

// players
let rows = document.querySelectorAll('.row');

for(let r of rows){

let p1 = r.querySelector('.p1').value.trim();
let p2 = r.querySelector('.p2').value.trim();

let ps1 = parseInt(r.querySelector('.s1').value)||0;
let ps2 = parseInt(r.querySelector('.s2').value)||0;

if(p1 && p1!=="Player") await updatePlayer(p1,ps1,ps2);
if(p2 && p2!=="Player") await updatePlayer(p2,ps2,ps1);
}

msg.innerText = "✅ Done!";
}

team1.onchange = renderPlayers;
team2.onchange = renderPlayers;

loadTeams();

</script>

</body>
</html>
