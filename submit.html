<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POP Match Submit</title>

<style>
body{font-family:sans-serif;background:#f5f7fb;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:15px}
select,input{width:100%;padding:10px;margin:5px 0}
button{padding:12px;background:#e94560;color:#fff;border:none;border-radius:10px}
.row{display:grid;grid-template-columns:1fr 80px 1fr 80px;gap:10px;margin-bottom:10px}
</style>
</head>

<body>

<div class="container">
<h2>Match Submit</h2>

<select id="team1"></select>
<select id="team2"></select>

<input type="number" id="score1" placeholder="Team1 Score">
<input type="number" id="score2" placeholder="Team2 Score">

<div id="players"></div>

<button id="submitBtn">Submit</button>

<p id="msg"></p>
</div>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const supabase = createClient(
'https://uwybeitqpnaqmcmqwbkv.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g'
);

let clubs=[];
const tournamentName="pop intra bid s-01";

// LOAD TEAMS
async function loadTeams(){
let {data,error}=await supabase.from('clubs').select('*').order('team_name');
if(error) return showError(error);

clubs=data;

let opt='<option value="">Select Team</option>';
data.forEach(t=> opt+=`<option value="${t.id}">${t.team_name}</option>`);

team1.innerHTML=opt;
team2.innerHTML=opt;
}

// ERROR
function showError(e){
console.error(e);
msg.innerText="❌ "+e.message;
}

// 🔥 NAME BASED CLUB UPDATE
async function updateClubByName(name,my,opp){

const {data,error}=await supabase
.from('clubs')
.select('*')
.ilike('team_name',name)
.limit(1);

if(error) throw error;
if(!data || data.length===0) throw new Error("Club not found: "+name);

let club=data[0];

let w=0,d=0,l=0,p=0;
if(my>opp){w=1;p=3}
else if(my==opp){d=1;p=1}
else l=1;

const {error:e2}=await supabase.from('clubs').update({
win:club.win+w,
draw:club.draw+d,
loss:club.loss+l,
gf:club.gf+my,
ga:club.ga+opp,
pts:club.pts+p
}).eq('id',club.id);

if(e2) throw e2;
}

// 🔥 NAME BASED TOURNAMENT UPDATE
async function updateTournamentByName(name,my,opp){

const {data,error}=await supabase
.from('tournament_teams')
.select('*')
.ilike('team_name',name)
.eq('tournament_name',tournamentName)
.limit(1);

if(error) throw error;

let w=0,d=0,l=0,p=0;
if(my>opp){w=1;p=3}
else if(my==opp){d=1;p=1}
else l=1;

if(data && data.length>0){

let t=data[0];

const {error:e2}=await supabase.from('tournament_teams').update({
matches_played:t.matches_played+1,
wins:t.wins+w,
draws:t.draws+d,
losses:t.losses+l,
goals_for:t.goals_for+my,
goals_against:t.goals_against+opp,
points:t.points+p
}).eq('id',t.id);

if(e2) throw e2;

}else{

const {error:e3}=await supabase.from('tournament_teams').insert({
id:crypto.randomUUID(),
team_name:name,
tournament_name:tournamentName,
matches_played:1,
wins:w,draws:d,losses:l,
goals_for:my,
goals_against:opp,
points:p
});

if(e3) throw e3;
}
}

// SUBMIT
async function submitMatch(){

msg.innerText="⏳ Processing...";

try{

let t1=team1.value;
let t2=team2.value;

if(!t1||!t2) return msg.innerText="Select teams";

let name1=clubs.find(c=>c.id==t1).team_name.trim();
let name2=clubs.find(c=>c.id==t2).team_name.trim();

let s1=parseInt(score1.value)||0;
let s2=parseInt(score2.value)||0;

// 🔥 NAME BASED
await updateTournamentByName(name1,s1,s2);
await updateTournamentByName(name2,s2,s1);

await updateClubByName(name1,s1,s2);
await updateClubByName(name2,s2,s1);

msg.innerText="✅ 100% DONE (NAME MATCHED)";

}catch(e){
showError(e);
}
}

submitBtn.onclick=submitMatch;

loadTeams();

</script>

</body>
</html>
