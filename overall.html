<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Rankings | Pirates of Pitch - POP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 30% 40%, rgba(233, 69, 96, 0.08), #0a0a0f 70%);
        }
        .bg-glow::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 60%, rgba(102, 126, 234, 0.06), transparent 60%);
        }

        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 40px;
        }

        /* Page Header */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .page-header h1 {
            font-size: 42px;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
            background: linear-gradient(135deg, #ffffff, #e94560);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .page-header h1 i {
            background: none;
            -webkit-background-clip: unset;
            color: #e94560;
            margin-right: 15px;
        }
        .page-header p {
            color: #9ca3af;
            font-size: 16px;
        }

        /* Stats Summary Cards */
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .summary-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .summary-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.05);
            border-color: rgba(233, 69, 96, 0.3);
        }
        .summary-icon {
            width: 50px;
            height: 50px;
            background: rgba(233, 69, 96, 0.15);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }
        .summary-icon i {
            font-size: 24px;
            color: #e94560;
        }
        .summary-number {
            font-size: 32px;
            font-weight: 800;
            font-family: 'Orbitron', monospace;
            margin-bottom: 5px;
        }
        .summary-label {
            font-size: 12px;
            color: #9ca3af;
            letter-spacing: 1px;
        }

        /* Rankings Container */
        .rankings-container {
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .rankings-header {
            background: linear-gradient(135deg, rgba(233,69,96,0.15), rgba(255,107,129,0.08));
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .rankings-header h2 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .rankings-header h2 i {
            color: #ffd700;
            font-size: 24px;
        }
        .rankings-header h2 span {
            color: #e94560;
            font-size: 14px;
            margin-left: 10px;
        }
        .rankings-table {
            width: 100%;
            border-collapse: collapse;
        }
        .rankings-table th {
            padding: 16px 12px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: #9ca3af;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: rgba(0,0,0,0.2);
            letter-spacing: 1px;
        }
        .rankings-table td {
            padding: 14px 12px;
            text-align: center;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: #ffffff;
        }
        .rankings-table tr:hover {
            background: rgba(255,255,255,0.03);
        }
        /* Rank Badge */
        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            font-size: 14px;
            font-weight: 700;
        }
        .rank-badge.rank-1 {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #1a1a2e;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }
        .rank-badge.rank-2 {
            background: linear-gradient(135deg, #c0c0c0, #a8a8a8);
            color: #1a1a2e;
        }
        .rank-badge.rank-3 {
            background: linear-gradient(135deg, #cd7f32, #b87333);
            color: #1a1a2e;
        }
        /* Player Cell */
        .player-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: flex-start;
        }
        .player-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #e94560;
            background: #1a1a2e;
        }
        .player-info {
            text-align: left;
        }
        .player-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }
        .player-club {
            font-size: 10px;
            color: #9ca3af;
        }
        /* Stats Cells */
        .stat-number {
            font-weight: 600;
        }
        .points-cell {
            font-weight: 700;
            color: #e94560;
            font-size: 18px;
            font-family: 'Orbitron', monospace;
        }
        .gd-positive {
            color: #2ecc71;
        }
        .gd-negative {
            color: #e74c3c;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #9ca3af;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(233,69,96,0.2);
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .no-data {
            text-align: center;
            padding: 60px;
            color: #9ca3af;
        }
        .no-data i {
            font-size: 50px;
            margin-bottom: 15px;
            opacity: 0.3;
        }
        .refresh-btn {
            background: linear-gradient(135deg, #e94560, #ff6b81);
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(233,69,96,0.3);
        }
        .refresh-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(233,69,96,0.4);
        }
        .refresh-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #6b7280;
        }

        @media (max-width: 1024px) {
            .stats-summary {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }
        @media (max-width: 768px) {
            .main-content { padding: 20px; }
            .page-header h1 { font-size: 28px; }
            .rankings-table th, .rankings-table td { padding: 10px 6px; font-size: 10px; }
            .player-avatar { width: 32px; height: 32px; }
            .player-name { font-size: 11px; }
            .points-cell { font-size: 14px; }
            .stats-summary { grid-template-columns: 1fr; }
            .rank-badge { width: 28px; height: 28px; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div id="navbar-placeholder"></div>

    <main class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-trophy"></i> PLAYER RANKINGS</h1>
            <p>Overall leaderboard - Top performers of all time</p>
        </div>

        <!-- Stats Summary Cards -->
        <div class="stats-summary">
            <div class="summary-card">
                <div class="summary-icon"><i class="fas fa-users"></i></div>
                <div class="summary-number" id="totalPlayers">0</div>
                <div class="summary-label">TOTAL PLAYERS</div>
            </div>
            <div class="summary-card">
                <div class="summary-icon"><i class="fas fa-futbol"></i></div>
                <div class="summary-number" id="totalMatches">0</div>
                <div class="summary-label">TOTAL MATCHES</div>
            </div>
            <div class="summary-card">
                <div class="summary-icon"><i class="fas fa-chart-line"></i></div>
                <div class="summary-number" id="totalGoals">0</div>
                <div class="summary-label">TOTAL GOALS</div>
            </div>
            <div class="summary-card">
                <div class="summary-icon"><i class="fas fa-star"></i></div>
                <div class="summary-number" id="avgPoints">0</div>
                <div class="summary-label">AVG POINTS</div>
            </div>
        </div>

        <!-- Rankings Table -->
        <div class="rankings-container">
            <div class="rankings-header">
                <h2><i class="fas fa-crown"></i> GLOBAL LEADERBOARD <span>Overall Rankings</span></h2>
            </div>
            <div style="overflow-x: auto;">
                <table class="rankings-table">
                    <thead>
                        <tr>
                            <th>RANK</th>
                            <th>PLAYER</th>
                            <th>MP</th>
                            <th>W</th>
                            <th>D</th>
                            <th>L</th>
                            <th>GF</th>
                            <th>GA</th>
                            <th>GD</th>
                            <th>PTS</th>
                        </tr>
                    </thead>
                    <tbody id="rankingsBody">
                        <tr><td colspan="10" class="loading"><div class="spinner"></div> Loading rankings...<\/td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div style="text-align: center;">
            <button id="refreshBtn" class="refresh-btn"><i class="fas fa-sync-alt"></i> Refresh Rankings</button>
        </div>
        <div class="footer-note">
            <i class="fas fa-chart-line"></i> Rankings based on points | Updated in real-time
        </div>
    </main>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const supabaseUrl = 'https://uwybeitqpnaqmcmqwbkv.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3eWJlaXRxcG5hcW1jbXF3Ymt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczODA0NDUsImV4cCI6MjA5Mjk1NjQ0NX0.EEleJhKLpGgWEppaSYCSQTP_swHDUHZ3ciycuBHUO8g';
        const supabase = createClient(supabaseUrl, supabaseAnonKey);

        // Load stats summary
        async function loadStatsSummary() {
            try {
                // Get total players
                const { count: playersCount } = await supabase
                    .from('players')
                    .select('*', { count: 'exact', head: true });
                document.getElementById('totalPlayers').innerText = playersCount || 0;

                // Get total matches from player_match_results
                const { count: matchesCount } = await supabase
                    .from('player_match_results')
                    .select('*', { count: 'exact', head: true });
                document.getElementById('totalMatches').innerText = matchesCount || 0;

                // Get total goals
                const { data: goalsData } = await supabase
                    .from('player_match_results')
                    .select('home_score, away_score');
                
                let totalGoals = 0;
                if (goalsData) {
                    goalsData.forEach(m => {
                        totalGoals += (m.home_score || 0) + (m.away_score || 0);
                    });
                }
                document.getElementById('totalGoals').innerText = totalGoals;

                // Get average points from player_stats
                const { data: statsData } = await supabase
                    .from('player_stats')
                    .select('points');
                
                let avgPoints = 0;
                if (statsData && statsData.length > 0) {
                    const totalPoints = statsData.reduce((sum, s) => sum + (s.points || 0), 0);
                    avgPoints = Math.round(totalPoints / statsData.length);
                }
                document.getElementById('avgPoints').innerText = avgPoints;

            } catch (err) {
                console.error('Error loading stats summary:', err);
            }
        }

        // Load player rankings from player_stats table
        async function loadRankings() {
            const tbody = document.getElementById('rankingsBody');
            tbody.innerHTML = '<tr><td colspan="10" class="loading"><div class="spinner"></div> Loading rankings...<\/td></tr>';
            
            try {
                const { data, error } = await supabase
                    .from('player_stats')
                    .select('*')
                    .order('points', { ascending: false })
                    .order('goals_for', { ascending: false });
                
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="10" class="no-data"><i class="fas fa-chart-line"></i><br>No data available. Submit matches to see rankings.<\/td></tr>`;
                    return;
                }
                
                tbody.innerHTML = data.map((player, index) => {
                    const rank = index + 1;
                    let rankClass = '';
                    if (rank === 1) rankClass = 'rank-1';
                    else if (rank === 2) rankClass = 'rank-2';
                    else if (rank === 3) rankClass = 'rank-3';
                    
                    const gd = (player.goals_for || 0) - (player.goals_against || 0);
                    const avatarUrl = `https://ui-avatars.com/api/?background=e94560&color=fff&bold=true&size=44&name=${encodeURIComponent(player.player_name || 'Player')}`;
                    
                    return `<tr>
                        <td><div class="rank-badge ${rankClass}">${rank}</div></td>
                        <td>
                            <div class="player-cell">
                                <img class="player-avatar" src="${avatarUrl}" alt="${player.player_name}">
                                <div class="player-info">
                                    <div class="player-name">${player.player_name || 'Unknown'}</div>
                                    <div class="player-club"><i class="fas fa-id-card"></i> ID: ${player.player_id?.substring(0, 8) || 'N/A'}...</div>
                                </div>
                            </div>
                        </td>
                        <td class="stat-number">${player.total_matches || 0}</td>
                        <td class="stat-number">${player.wins || 0}</td>
                        <td class="stat-number">${player.draws || 0}</td>
                        <td class="stat-number">${player.losses || 0}</td>
                        <td class="stat-number">${player.goals_for || 0}</td>
                        <td class="stat-number">${player.goals_against || 0}</td>
                        <td class="${gd >= 0 ? 'gd-positive' : 'gd-negative'}">${gd >= 0 ? '+' : ''}${gd}</td>
                        <td class="points-cell">${player.points || 0}</td>
                    </tr>`;
                }).join('');
                
            } catch (err) {
                console.error('Error loading rankings:', err);
                tbody.innerHTML = '<tr><td colspan="10" class="no-data"><i class="fas fa-exclamation-triangle"></i><br>Error loading data. Please try again.<\/td></tr>';
            }
        }

        // Refresh all data
        async function refreshData() {
            const refreshBtn = document.getElementById('refreshBtn');
            refreshBtn.disabled = true;
            refreshBtn.innerHTML = '<span class="spinner"></span> Refreshing...';
            
            try {
                await loadStatsSummary();
                await loadRankings();
            } catch (err) {
                console.error('Refresh error:', err);
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i> Refresh Rankings';
            }
        }

        // Load navbar
        async function loadNavbar() {
            try {
                const response = await fetch('/navbar.html');
                const navbarHtml = await response.text();
                document.getElementById('navbar-placeholder').innerHTML = navbarHtml;
            } catch(e) { console.log('Navbar load skipped'); }
        }

        // Initialize
        document.getElementById('refreshBtn').addEventListener('click', refreshData);
        
        async function init() {
            await loadNavbar();
            await loadStatsSummary();
            await loadRankings();
        }
        init();
    </script>
</body>
</html>
