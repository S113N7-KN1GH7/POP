<script>
    // Active page highlight
    (function() {
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-link').forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPage) {
                link.classList.add('active');
            }
        });

        // Check if dropdown contains active page
        document.querySelectorAll('.dropdown-content a').forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPage) {
                const parentDropdown = link.closest('.dropdown');
                if (parentDropdown) {
                    parentDropdown.querySelector('.dropdown-btn').classList.add('active');
                }
            }
        });
    })();

    // Mobile menu toggle
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const navLinks = document.getElementById('navLinks');

    if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            navLinks.classList.toggle('show');
        });
    }

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
        if (navLinks && navLinks.classList.contains('show')) {
            if (!e.target.closest('.top-navbar')) {
                navLinks.classList.remove('show');
            }
        }
    });

    // Close menu on link click (mobile)
    document.querySelectorAll('.nav-link, .dropdown-content a').forEach(link => {
        link.addEventListener('click', () => {
            if (window.innerWidth <= 850) {
                if (navLinks && navLinks.classList.contains('show')) {
                    navLinks.classList.remove('show');
                }
            }
        });
    });

    // Check if user is logged in and update navbar accordingly
    async function updateNavbarForUser() {
        if (typeof supabase !== 'undefined' && supabase.auth) {
            const { data: { user }, error } = await supabase.auth.getUser();

            const guestMode = document.getElementById('guestMode');
            const userMode = document.getElementById('userMode');
            const rankBadge = document.getElementById('rankBadge');

            if (user && !error) {
                // User is logged in
                if (guestMode) guestMode.style.display = 'none';
                if (userMode) userMode.style.display = 'block';
                if (rankBadge) rankBadge.style.display = 'flex';

                // Update user info
                const userName = user.user_metadata?.player_name || user.email.split('@')[0];
                const userNameSpan = document.getElementById('userName');
                if (userNameSpan) userNameSpan.innerText = userName;

                // Get player avatar
                const { data: playerData } = await supabase
                    .from('players')
                    .select('photo')
                    .eq('id', user.id)
                    .single();

                if (playerData?.photo) {
                    const userAvatar = document.getElementById('userAvatar');
                    if (userAvatar) userAvatar.src = playerData.photo;
                } else {
                    const userAvatar = document.getElementById('userAvatar');
                    if (userAvatar) userAvatar.src = `https://ui-avatars.com/api/?background=e94560&color=fff&bold=true&size=35&name=${encodeURIComponent(userName)}`;
                }

                // Get player rank
                const { data: ranked } = await supabase
                    .from('players')
                    .select('player_name, pts')
                    .order('pts', { ascending: false });

                if (ranked && userName) {
                    const rank = ranked.findIndex(p => p.player_name === userName) + 1;
                    const rankDisplay = document.getElementById('rankDisplay');
                    if (rankDisplay) rankDisplay.innerText = `Rank #${rank || 1}`;
                }
            } else {
                // Guest user
                if (guestMode) guestMode.style.display = 'flex';
                if (userMode) userMode.style.display = 'none';
                if (rankBadge) rankBadge.style.display = 'none';
            }
        }
    }

    // Player Logout Function
    const logoutPlayerBtn = document.getElementById('logoutPlayerBtn');
    if (logoutPlayerBtn) {
        logoutPlayerBtn.addEventListener('click', async () => {
            if (typeof supabase !== 'undefined' && supabase.auth) {
                await supabase.auth.signOut();
            }
            localStorage.removeItem('pop123_user');
            localStorage.removeItem('supabase_session');
            sessionStorage.clear();
            window.location.href = 'index.html';
        });
    }

    // Club Logout Function
    const logoutClubBtn = document.getElementById('logoutClubBtn');
    if (logoutClubBtn) {
        logoutClubBtn.addEventListener('click', async () => {
            if (typeof supabase !== 'undefined' && supabase.auth) {
                await supabase.auth.signOut();
            }
            localStorage.removeItem('pop123_club');
            localStorage.removeItem('supabase_session');
            sessionStorage.clear();
            window.location.href = 'index.html';
        });
    }

    // Run when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updateNavbarForUser);
    } else {
        updateNavbarForUser();
    }
</script>
