<!-- navbar.html - Complete Fixed & Beautiful Navbar -->
<nav class="top-navbar">
    <div class="logo-area">
        <div class="logo-icon">🏴‍☠️</div>
        <div>
            <div class="logo-text">PIRATES OF <span>PITCH</span></div>
            <div class="logo-sub">OFFICIAL GAMING LEAGUE</div>
        </div>
    </div>
    
    <button class="mobile-menu-btn" id="mobileMenuBtn">
        <i class="fas fa-bars"></i>
    </button>
    
    <div class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link" data-page="index.html"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="dashboard.html" class="nav-link" data-page="dashboard.html"><i class="fas fa-tachometer-alt"></i><span>Player</span></a>
        <a href="club-dashboard.html" class="nav-link" data-page="club-dashboard.html"><i class="fas fa-users"></i><span>Club</span></a>
        <a href="point-table.html" class="nav-link" data-page="point-table.html"><i class="fas fa-trophy"></i><span>Point Table</span></a>

    <div class="auth-buttons" id="authButtons">
        <div class="auth-loading"><i class="fas fa-spinner fa-spin"></i></div>
    </div>
</nav>

<style>
    /* ========== NAVBAR STYLES ========== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    .top-navbar {
        background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
        border-bottom: 1px solid rgba(233, 69, 96, 0.15);
        padding: 0 40px;
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 75px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
        backdrop-filter: blur(10px);
    }

    /* Logo Area */
    .logo-area {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        transition: transform 0.3s ease;
    }
    .logo-area:hover {
        transform: scale(1.02);
    }
    .logo-icon {
        font-size: 38px;
        animation: sway 3s ease-in-out infinite;
        filter: drop-shadow(0 2px 5px rgba(233, 69, 96, 0.2));
    }
    @keyframes sway {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(8deg); }
    }
    .logo-text {
        font-family: 'Orbitron', monospace;
        font-size: 20px;
        font-weight: 800;
        background: linear-gradient(135deg, #1a1a2e 0%, #e94560 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        letter-spacing: 1px;
    }
    .logo-text span {
        color: #e94560;
        background: none;
    }
    .logo-sub {
        font-size: 9px;
        color: #8892b0;
        letter-spacing: 1.5px;
        margin-top: 2px;
        text-transform: uppercase;
    }

    /* Navigation Links */
    .nav-links {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(248, 250, 252, 0.8);
        padding: 5px;
        border-radius: 50px;
        backdrop-filter: blur(5px);
    }
    .nav-link {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 22px;
        border-radius: 40px;
        color: #4a5568;
        text-decoration: none;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }
    .nav-link::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.15), transparent);
        transition: left 0.5s;
    }
    .nav-link:hover::before {
        left: 100%;
    }
    .nav-link i {
        font-size: 15px;
        transition: transform 0.3s ease;
    }
    .nav-link:hover i {
        transform: translateY(-2px);
    }
    .nav-link:hover {
        background: #e94560;
        color: #ffffff;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(233, 69, 96, 0.3);
    }
    .nav-link.active {
        background: #e94560;
        color: #ffffff;
        box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
    }
    .nav-link.active i {
        transform: scale(1.1);
    }

    /* Auth Buttons */
    .auth-buttons {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .auth-loading {
        padding: 8px 16px;
        color: #8892b0;
        font-size: 14px;
    }
    /* Logged In State */
    .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        background: linear-gradient(135deg, #f0f4f8, #e8ecf1);
        padding: 5px 18px 5px 8px;
        border-radius: 50px;
        border: 1px solid rgba(233, 69, 96, 0.2);
        transition: all 0.3s ease;
    }
    .user-info:hover {
        background: linear-gradient(135deg, #e8ecf1, #e0e4e8);
        transform: translateY(-1px);
    }
    .user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #e94560;
        background: white;
    }
    .user-name {
        font-size: 13px;
        font-weight: 600;
        color: #1a1a2e;
        max-width: 130px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .logout-nav-btn {
        background: rgba(233, 69, 96, 0.1);
        border: none;
        color: #e94560;
        cursor: pointer;
        padding: 6px 14px;
        border-radius: 30px;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .logout-nav-btn:hover {
        background: #e94560;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 2px 8px rgba(233, 69, 96, 0.3);
    }
    /* Logged Out State */
    .login-nav-btn, .signup-nav-btn, .club-nav-btn {
        padding: 8px 22px;
        border-radius: 40px;
        text-decoration: none;
        font-weight: 600;
        font-size: 13px;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    .login-nav-btn {
        background: transparent;
        border: 1.5px solid #e94560;
        color: #e94560;
    }
    .login-nav-btn:hover {
        background: #e94560;
        color: white;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
    }
    .signup-nav-btn {
        background: linear-gradient(135deg, #e94560, #ff6b81);
        color: white;
        box-shadow: 0 2px 8px rgba(233, 69, 96, 0.25);
    }
    .signup-nav-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(233, 69, 96, 0.35);
    }
    .club-nav-btn {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
    }
    .club-nav-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(102, 126, 234, 0.35);
    }

    /* Mobile Menu Button */
    .mobile-menu-btn {
        display: none;
        background: linear-gradient(135deg, #e94560, #ff6b81);
        border: none;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        color: white;
        cursor: pointer;
        font-size: 20px;
        transition: all 0.3s ease;
        box-shadow: 0 2px 10px rgba(233, 69, 96, 0.3);
    }
    .mobile-menu-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    /* Responsive Design */
    @media (max-width: 1050px) {
        .nav-link span { display: none; }
        .nav-link { padding: 8px 16px; }
        .nav-link i { font-size: 18px; }
    }
    @media (max-width: 900px) {
        .top-navbar { padding: 0 25px; }
        .logo-sub { display: none; }
        .nav-link span { display: none; }
        .nav-link { padding: 8px 14px; }
    }
    @media (max-width: 768px) {
        .top-navbar { height: 65px; padding: 0 20px; }
        .logo-text { font-size: 16px; }
        .logo-icon { font-size: 30px; }
        .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
        .nav-links {
            position: fixed;
            top: 65px;
            left: -100%;
            width: 280px;
            height: calc(100vh - 65px);
            background: linear-gradient(135deg, #ffffff, #f8f9fa);
            flex-direction: column;
            padding: 25px 20px;
            gap: 12px;
            border-radius: 0 20px 20px 0;
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.1);
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            align-items: stretch;
            backdrop-filter: blur(20px);
            border-right: 2px solid #e94560;
        }
        .nav-links.show { left: 0; }
        .nav-link {
            justify-content: flex-start;
            padding: 12px 20px;
            border-radius: 12px;
        }
        .nav-link span { display: inline; }
        .nav-link i { font-size: 18px; width: 28px; }
        .user-info { padding: 5px 12px 5px 8px; }
        .user-name { max-width: 100px; font-size: 12px; }
        .logout-nav-btn span { display: none; }
        .logout-nav-btn { padding: 6px 10px; }
        .login-nav-btn span, .signup-nav-btn span, .club-nav-btn span { display: none; }
        .login-nav-btn, .signup-nav-btn, .club-nav-btn { padding: 8px 14px; }
    }
    @media (max-width: 480px) {
        .top-navbar { padding: 0 15px; }
        .logo-text { font-size: 14px; }
        .logo-icon { font-size: 26px; }
        .login-nav-btn, .signup-nav-btn, .club-nav-btn { padding: 6px 10px; }
        .user-avatar { width: 30px; height: 30px; }
    }
</style>

<script>
(function() {
    // ========== UPDATE AUTH UI FUNCTION ==========
    async function updateAuthUI() {
        const authContainer = document.getElementById('authButtons');
        if (!authContainer) return;
        
        // Check if supabase is available
        if (typeof supabase === 'undefined' || !supabase.auth) {
            authContainer.innerHTML = `
                <a href="login.html" class="login-nav-btn"><i class="fas fa-sign-in-alt"></i><span>Login</span></a>
                <a href="signup.html" class="signup-nav-btn"><i class="fas fa-user-plus"></i><span>Sign Up</span></a>
            `;
            return;
        }
        
        try {
            const { data: { user }, error } = await supabase.auth.getUser();
            
            if (user && !error) {
                // USER IS LOGGED IN - Get user info
                let playerName = user.user_metadata?.player_name || user.email.split('@')[0];
                let playerEmail = user.email;
                let avatarUrl = `https://ui-avatars.com/api/?background=e94560&color=fff&bold=true&size=36&name=${encodeURIComponent(playerName)}`;
                let userType = 'player';
                
                // Try to get player photo from players table
                try {
                    const { data: player } = await supabase
                        .from('players')
                        .select('photo, player_name')
                        .eq('id', user.id)
                        .single();
                    if (player?.photo) avatarUrl = player.photo;
                    if (player?.player_name) playerName = player.player_name;
                } catch(e) {
                    // Maybe user is club admin
                    try {
                        const { data: club } = await supabase
                            .from('clubs')
                            .select('team_name, team_logo')
                            .eq('id', user.id)
                            .single();
                        if (club) {
                            playerName = club.team_name;
                            if (club.team_logo) avatarUrl = club.team_logo;
                            userType = 'club';
                        }
                    } catch(e2) {}
                }
                
                // Show user info with logout button
                authContainer.innerHTML = `
                    <div class="user-info" id="userInfoDropdown">
                        <img class="user-avatar" src="${avatarUrl}" alt="${playerName}">
                        <span class="user-name" title="${playerEmail}">${playerName.substring(0, 15)}</span>
                        <button id="navbarLogoutBtn" class="logout-nav-btn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></button>
                    </div>
                `;
                
                // Add logout event
                const logoutBtn = document.getElementById('navbarLogoutBtn');
                if (logoutBtn) {
                    logoutBtn.addEventListener('click', async (e) => {
                        e.preventDefault();
                        await supabase.auth.signOut();
                        localStorage.removeItem('pop123_user');
                        localStorage.removeItem('pop123_club');
                        window.location.href = 'index.html';
                    });
                }
            } else {
                // USER IS NOT LOGGED IN
                authContainer.innerHTML = `
                    <a href="login.html" class="login-nav-btn"><i class="fas fa-sign-in-alt"></i><span>Login</span></a>
                    <a href="signup.html" class="signup-nav-btn"><i class="fas fa-user-plus"></i><span>Sign Up</span></a>
                    <a href="club-login.html" class="club-nav-btn"><i class="fas fa-building"></i><span>Club</span></a>
                `;
            }
        } catch (err) {
            console.error('Auth check error:', err);
            authContainer.innerHTML = `
                <a href="login.html" class="login-nav-btn"><i class="fas fa-sign-in-alt"></i><span>Login</span></a>
                <a href="signup.html" class="signup-nav-btn"><i class="fas fa-user-plus"></i><span>Sign Up</span></a>
            `;
        }
    }
    
    // ========== HIGHLIGHT ACTIVE PAGE ==========
    function highlightActivePage() {
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-link').forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPage) {
                link.classList.add('active');
            }
        });
    }
    
    // ========== MOBILE MENU ==========
    function setupMobileMenu() {
        const mobileBtn = document.getElementById('mobileMenuBtn');
        const navLinks = document.getElementById('navLinks');
        if (!mobileBtn || !navLinks) return;
        
        mobileBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            navLinks.classList.toggle('show');
            mobileBtn.innerHTML = navLinks.classList.contains('show') ? '<i class="fas fa-times"></i>' : '<i class="fas fa-bars"></i>';
        });
        
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.top-navbar') && navLinks.classList.contains('show')) {
                navLinks.classList.remove('show');
                mobileBtn.innerHTML = '<i class="fas fa-bars"></i>';
            }
        });
        
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                navLinks.classList.remove('show');
                mobileBtn.innerHTML = '<i class="fas fa-bars"></i>';
            });
        });
    }
    
    // ========== WAIT FOR SUPABASE AND INIT ==========
    let supabaseCheckAttempts = 0;
    function waitForSupabaseAndInit() {
        if (typeof supabase !== 'undefined' && supabase.auth) {
            updateAuthUI();
            // Listen for auth state changes (login/logout)
            supabase.auth.onAuthStateChange(() => {
                updateAuthUI();
            });
        } else if (supabaseCheckAttempts < 20) {
            supabaseCheckAttempts++;
            setTimeout(waitForSupabaseAndInit, 200);
        } else {
            updateAuthUI();
        }
    }
    
    // Run all functions
    highlightActivePage();
    setupMobileMenu();
    waitForSupabaseAndInit();
})();
</script>
