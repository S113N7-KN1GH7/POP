<style>
    /* ========== NEW NAVBAR DESIGN ========== */
    .top-navbar {
        background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
        border-bottom: 1px solid rgba(233, 69, 96, 0.2);
        padding: 0 40px;
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 70px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        backdrop-filter: blur(10px);
    }

    .logo-area {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        transition: transform 0.3s ease;
    }

    .logo-area:hover {
        transform: scale(1.02);
    }

    .logo-icon {
        font-size: 34px;
        animation: sway 3s ease-in-out infinite;
        filter: drop-shadow(0 2px 5px rgba(233, 69, 96, 0.3));
    }

    @keyframes sway {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(12deg); }
    }

    .logo-text {
        font-family: 'Orbitron', monospace;
        font-size: 20px;
        font-weight: 800;
        background: linear-gradient(135deg, #1a1a2e 0%, #e94560 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        letter-spacing: 1px;
    }

    .logo-text span {
        color: #e94560;
        background: none;
        font-weight: 900;
    }

    .logo-sub {
        font-size: 8px;
        color: #8892b0;
        letter-spacing: 1.5px;
        margin-top: 2px;
        text-transform: uppercase;
    }

    .nav-links {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255, 255, 255, 0.5);
        padding: 5px;
        border-radius: 50px;
        backdrop-filter: blur(5px);
    }

    .nav-link {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 20px;
        border-radius: 40px;
        color: #4a5568;
        text-decoration: none;
        font-weight: 600;
        font-size: 13px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    .nav-link::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.2), transparent);
        transition: left 0.5s;
    }

    .nav-link:hover::before {
        left: 100%;
    }

    .nav-link i {
        font-size: 14px;
        transition: transform 0.3s ease;
    }

    .nav-link:hover i {
        transform: translateY(-2px);
    }

    .nav-link:hover {
        background: linear-gradient(135deg, #e94560, #ff6b81);
        color: #ffffff;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
    }

    .nav-link.active {
        background: linear-gradient(135deg, #e94560, #ff6b81);
        color: #ffffff;
        box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
    }

    .nav-link.active i {
        transform: scale(1.1);
    }

    .auth-buttons {
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .rank-badge {
        background: linear-gradient(135deg, #f0f4f8, #e8ecf1);
        padding: 6px 16px;
        border-radius: 30px;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: default;
        transition: all 0.3s ease;
        border: 1px solid rgba(233, 69, 96, 0.2);
    }

    .rank-badge i {
        color: #f5a623;
        font-size: 14px;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
    }

    .rank-badge span {
        background: linear-gradient(135deg, #1a1a2e, #e94560);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        font-weight: 700;
    }

    .logout-btn {
        background: transparent;
        border: 1px solid #e94560;
        padding: 6px 18px;
        border-radius: 30px;
        color: #e94560;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 13px;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }

    .logout-btn::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(233, 69, 96, 0.2), transparent);
        transition: left 0.5s;
    }

    .logout-btn:hover::before {
        left: 100%;
    }

    .logout-btn:hover {
        background: #e94560;
        color: #ffffff;
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
    }

    .mobile-menu-btn {
        display: none;
        background: linear-gradient(135deg, #e94560, #ff6b81);
        border: none;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        color: white;
        cursor: pointer;
        font-size: 20px;
        transition: all 0.3s ease;
        box-shadow: 0 2px 10px rgba(233, 69, 96, 0.3);
    }

    .mobile-menu-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }

    /* Dropdown Animation */
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Responsive Design */
    @media (max-width: 1100px) {
        .nav-link span {
            display: none;
        }
        .nav-link {
            padding: 8px 15px;
        }
        .nav-link i {
            font-size: 18px;
        }
    }

    @media (max-width: 900px) {
        .top-navbar {
            padding: 0 20px;
        }
        .logo-sub {
            display: none;
        }
        .rank-badge span {
            display: none;
        }
        .rank-badge {
            padding: 6px 12px;
        }
    }

    @media (max-width: 768px) {
        .top-navbar {
            height: 60px;
            padding: 0 15px;
        }
        
        .logo-text {
            font-size: 16px;
        }
        
        .logo-icon {
            font-size: 28px;
        }
        
        .mobile-menu-btn {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .nav-links {
            position: fixed;
            top: 60px;
            left: -100%;
            width: 280px;
            height: calc(100vh - 60px);
            background: linear-gradient(135deg, #ffffff, #f8f9fa);
            flex-direction: column;
            padding: 20px;
            gap: 12px;
            border-radius: 0 20px 20px 0;
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.1);
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            align-items: stretch;
            backdrop-filter: blur(20px);
            border-right: 2px solid #e94560;
        }
        
        .nav-links.show {
            left: 0;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                left: -100%;
                opacity: 0;
            }
            to {
                left: 0;
                opacity: 1;
            }
        }
        
        .nav-link {
            padding: 12px 20px;
            border-radius: 12px;
            justify-content: flex-start;
        }
        
        .nav-link span {
            display: inline;
        }
        
        .nav-link i {
            font-size: 18px;
            width: 25px;
        }
        
        .rank-badge span {
            display: inline;
        }
        
        .rank-badge {
            padding: 6px 16px;
        }
        
        .logout-btn span {
            display: inline;
        }
    }

    @media (max-width: 480px) {
        .logo-text {
            font-size: 14px;
        }
        
        .logo-icon {
            font-size: 24px;
        }
        
        .rank-badge {
            display: none;
        }
        
        .logout-btn {
            padding: 6px 14px;
        }
        
        .nav-links {
            width: 260px;
        }
    }
</style>

<script>
    // Active page highlight
    (function() {
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.nav-link').forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPage) {
                link.classList.add('active');
            }
        });
    })();

    // Mobile menu toggle
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const navLinks = document.getElementById('navLinks');
    
    if (mobileMenuBtn) {
        mobileMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            navLinks.classList.toggle('show');
        });
    }

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
        if (navLinks && navLinks.classList.contains('show')) {
            if (!e.target.closest('.top-navbar')) {
                navLinks.classList.remove('show');
            }
        }
    });

    // Close menu on link click
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', () => {
            if (navLinks && navLinks.classList.contains('show')) {
                navLinks.classList.remove('show');
            }
        });
    });

    // Logout functionality
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) {
        logoutBtn.addEventListener('click', async () => {
            if (typeof supabase !== 'undefined' && supabase.auth) {
                await supabase.auth.signOut();
            }
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'index.html';
        });
    }
</script>
